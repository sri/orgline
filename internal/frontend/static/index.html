          }
          button.innerHTML = heartIconMarkup(isActive);
        }

        function pushUndoAction(action) {
          if (applyingUndo) {
            return;
          }
          if (!action || typeof action.apply !== "function") {
            return;
          }
          undoStack.push(action);
          if (undoStack.length > maxUndoDepth) {
            undoStack.shift();
          }
          setTopActionsState();
        }

        function peekUndoAction() {
          if (undoStack.length === 0) {
            return null;
          }
          return undoStack[undoStack.length - 1];
        }

        async function performUndo() {
          if (topActionsBusy || undoStack.length === 0) {
            return;
          }

          const action = undoStack.pop();
          if (!action) {
            setTopActionsState();
            return;
          }

          topActionsBusy = true;
          setTopActionsState();
          applyingUndo = true;
          try {
            await action.apply();
            await loadOutline(action.focusUUID || "");
            clearError();
          } catch (error) {
            showError(`Unable to undo: ${String(error)}`);
          } finally {
            applyingUndo = false;
            topActionsBusy = false;
            setTopActionsState();
          }
        }

        function setTopActionsState() {
          const treeActionsDisabled = topActionsBusy || searchModeActive || !lastRenderState;
          if (undoBtnEl instanceof HTMLButtonElement) {
            undoBtnEl.disabled = topActionsBusy || undoStack.length === 0;
          }
          if (treeActionsDisabled) {
            if (expandAllBtnEl instanceof HTMLButtonElement) {
              expandAllBtnEl.disabled = true;
            }
            if (expandLevelBtnEl instanceof HTMLButtonElement) {
              expandLevelBtnEl.disabled = true;
            }
            if (collapseAllBtnEl instanceof HTMLButtonElement) {
              collapseAllBtnEl.disabled = true;
            }
          } else {
            const expandableItems = collectExpandableItems(
              lastRenderState.baseItems,
              lastRenderState.searchActive,
              lastRenderState.searchView
            );
            const hasCollapsed = expandableItems.some((item) => item.is_open === false);
            const hasExpanded = expandableItems.some((item) => item.is_open === true);
            const visibleClosedExpandableItems = collectVisibleClosedExpandableItems(
              lastRenderState.baseItems,
              lastRenderState.searchActive,
              lastRenderState.searchView
            );

            if (expandAllBtnEl instanceof HTMLButtonElement) {
              expandAllBtnEl.disabled = !hasCollapsed;
            }
            if (expandLevelBtnEl instanceof HTMLButtonElement) {
              expandLevelBtnEl.disabled = visibleClosedExpandableItems.length === 0;
            }
            if (collapseAllBtnEl instanceof HTMLButtonElement) {
              collapseAllBtnEl.disabled = !hasExpanded;
            }
          }

          if (favoriteItemBtnEl instanceof HTMLButtonElement) {
            const treeItems = lastRenderState ? collectTreeItems(lastRenderState.baseItems, []) : [];
            const hasTreeItems = treeItems.length > 0;
            const hasFavoriteItems = treeItems.some((item) => item.is_favorite === true);

            favoriteItemBtnEl.disabled = topActionsBusy || (!favoriteFilterActive && (!hasTreeItems || !hasFavoriteItems));
            favoriteItemBtnEl.classList.toggle("is-active", favoriteFilterActive);
            favoriteItemBtnEl.classList.toggle("is-favorite-active", favoriteFilterActive);
            setHeartIcon(favoriteItemBtnEl, favoriteFilterActive);
            favoriteItemBtnEl.setAttribute(
              "title",
              favoriteFilterActive ? "Show all items" : "Show favorites only"
            );
            favoriteItemBtnEl.setAttribute(
              "aria-label",
              favoriteFilterActive ? "Show all items" : "Show favorites only"
            );
          }
        }

        function markItemDirty(uuid, isDirty) {
          if (!uuid) {
            return;
          }
          if (isDirty) {
            dirtyEditingItemIDs.add(uuid);
            return;
          }
          dirtyEditingItemIDs.delete(uuid);
        }

        function hasUnsavedChanges() {
          return pendingBodySaveCount > 0 || dirtyEditingItemIDs.size > 0;
        }

        function closeAllToolMenus() {
          if (!rootEl) {
            return;
          }

          for (const menu of rootEl.querySelectorAll(".item-tool-menu")) {
            if (menu instanceof HTMLElement) {
              menu.hidden = true;
            }
          }
          for (const trigger of rootEl.querySelectorAll(".item-tool-trigger")) {
            if (trigger instanceof HTMLElement) {
              trigger.setAttribute("aria-expanded", "false");
            }
          }
        }

        function escapeSelectorValue(value) {
          if (typeof CSS !== "undefined" && typeof CSS.escape === "function") {
            return CSS.escape(value);
          }
          return value.replaceAll("\"", "\\\"");
        }

        function applySelectedItemUI() {
          if (!rootEl) {
            return;
          }

          for (const row of rootEl.querySelectorAll(".item-row.is-selected")) {
            row.classList.remove("is-selected");
          }
          for (const row of rootEl.querySelectorAll(".item-row.is-drag-selected")) {
            row.classList.remove("is-drag-selected");
          }

          if (selectedItemUUID === "") {
            for (const uuid of dragSelectedItemUUIDs) {
              const dragRow = rootEl.querySelector(`.item-row[data-uuid="${escapeSelectorValue(uuid)}"]`);
              if (dragRow instanceof HTMLElement) {
                dragRow.classList.add("is-drag-selected");
              }
            }
            return;
          }

          const row = rootEl.querySelector(`.item-row[data-uuid="${escapeSelectorValue(selectedItemUUID)}"]`);
          if (row instanceof HTMLElement) {
            row.classList.add("is-selected");
          }

          for (const uuid of dragSelectedItemUUIDs) {
            if (uuid === selectedItemUUID) {
              continue;
            }
            const dragRow = rootEl.querySelector(`.item-row[data-uuid="${escapeSelectorValue(uuid)}"]`);
            if (dragRow instanceof HTMLElement) {
              dragRow.classList.add("is-drag-selected");
            }
          }
        }

        function setSelectedItem(uuid, preserveDragSelection = false) {
          selectedItemUUID = uuid || "";
          if (!preserveDragSelection) {
            keyboardRangeAnchorUUID = "";
            dragSelectedItemUUIDs.clear();
          }
          applySelectedItemUI();
          setTopActionsState();
        }

        function clearDragSelection() {
          dragSelectedItemUUIDs.clear();
          applySelectedItemUI();
        }

        function setRangeSelectionByVisibleOrder(anchorUUID, activeUUID) {
          const uuids = visibleItemUUIDs();
          const anchorIndex = uuids.indexOf(anchorUUID);
          const activeIndex = uuids.indexOf(activeUUID);
          if (anchorIndex < 0 || activeIndex < 0) {
            dragSelectedItemUUIDs.clear();
            applySelectedItemUI();
            return;
          }

          const start = Math.min(anchorIndex, activeIndex);
          const end = Math.max(anchorIndex, activeIndex);
          dragSelectedItemUUIDs.clear();
          for (let index = start; index <= end; index += 1) {
            dragSelectedItemUUIDs.add(uuids[index]);
          }
          applySelectedItemUI();
        }

        function startDragSelectionAtClientY(clientY) {
          const startUUID = itemUUIDNearClientY(clientY);
          if (startUUID === "") {
            return false;
          }

          dragSelectionAnchorUUID = startUUID;
          dragSelectionActive = true;
          keyboardRangeAnchorUUID = "";
          setSelectedItem(startUUID, true);
          setRangeSelectionByVisibleOrder(startUUID, startUUID);
          return true;
        }

        function updateDragSelectionAtClientY(clientY) {
          if (!dragSelectionActive) {
            return;
          }

          const anchorUUID = dragSelectionAnchorUUID;
          if (anchorUUID === "") {
            return;
          }

          const targetUUID = itemUUIDNearClientY(clientY);
          if (targetUUID === "") {
            return;
          }

          setSelectedItem(targetUUID, true);
          setRangeSelectionByVisibleOrder(anchorUUID, targetUUID);
        }

        function zoomItemIDFromURL() {
          const params = new URLSearchParams(window.location.search);
          return (params.get(zoomQueryParam) || "").trim();
        }

        function writeZoomItemIDToURL(itemID, replaceHistory = false) {
          const url = new URL(window.location.href);
          if (itemID === "") {
            url.searchParams.delete(zoomQueryParam);
          } else {
            url.searchParams.set(zoomQueryParam, itemID);
          }

          if (replaceHistory) {
            window.history.replaceState({}, "", url.toString());
            return;
          }
          window.history.pushState({}, "", url.toString());
        }

        function zoomToItem(itemID) {
          const current = zoomItemIDFromURL();
          writeZoomItemIDToURL(itemID, current === itemID);
        }

        function findItemByUUID(items, uuid) {
          for (const item of items) {
            if (item.uuid === uuid) {
              return item;
            }
            const foundInChildren = findItemByUUID(item.children, uuid);
            if (foundInChildren) {
              return foundInChildren;
            }
          }

          return null;
        }

        function findParentUUID(items, targetUUID, parentUUID = "") {
          for (const item of items) {
            if (item.uuid === targetUUID) {
              return parentUUID;
            }
            const found = findParentUUID(item.children, targetUUID, item.uuid);
            if (found !== null) {
              return found;
            }
          }

          return null;
        }

        function findItemLocation(items, uuid, parentItem = null) {
          for (let index = 0; index < items.length; index += 1) {
            const item = items[index];
            if (item.uuid === uuid) {
              return { item, parentItem, list: items, index };
            }

            const found = findItemLocation(item.children, uuid, item);
            if (found) {
              return found;
            }
          }

          return null;
        }

        function requireItemLocation(uuid) {
          const location = findItemLocation(outlineItems, uuid);
          if (!location) {
            throw new Error(`item not found: ${uuid}`);
          }
          return location;
        }

        function itemPositionSnapshot(uuid) {
          const location = findItemLocation(outlineItems, uuid);
          if (!location) {
            return null;
          }

          return {
            parentUUID: location.parentItem ? location.parentItem.uuid : "",
            index: location.index
          };
        }

        function setZoomContextVisible(isVisible, parentUUID = "") {
          if (!(zoomContextEl instanceof HTMLElement)) {
            return;
          }

          zoomContextEl.hidden = !isVisible;
          if (!isVisible) {
            return;
          }

          if (zoomHomeLinkEl instanceof HTMLAnchorElement) {
            const homeURL = new URL(window.location.href);
            homeURL.searchParams.delete(zoomQueryParam);
            zoomHomeLinkEl.href = homeURL.toString();
          }

          if (zoomParentLinkEl instanceof HTMLAnchorElement) {
            const hasParent = parentUUID !== "";
            zoomParentLinkEl.hidden = !hasParent;
            if (hasParent) {
              const parentURL = new URL(window.location.href);
              parentURL.searchParams.set(zoomQueryParam, parentUUID);
              zoomParentLinkEl.href = parentURL.toString();
            } else {
              zoomParentLinkEl.href = "";
            }
          }
        }

        function activeSearchQuery() {
          if (!(searchInputEl instanceof HTMLInputElement)) {
            return "";
          }
          return searchInputEl.value.trim();
        }

        function shouldActivateSearch(query) {
          return query.length >= searchMinChars;
        }

        function collectOpenState(items, openMap = new Map()) {
          for (const item of items) {
            openMap.set(item.uuid, item.is_open);
            collectOpenState(item.children, openMap);
          }
          return openMap;
        }

        function applyOpenState(items, openMap) {
          if (!(openMap instanceof Map)) {
            return;
          }

          for (const item of items) {
            if (openMap.has(item.uuid)) {
              item.is_open = openMap.get(item.uuid);
            }
            applyOpenState(item.children, openMap);
          }
        }

        function collectSearchView(items, query) {
          const visibleIDs = new Set();
          const matchedIDs = new Set();
          const forcedOpenIDs = new Set();
          const queryLower = query.toLocaleLowerCase();

          if (queryLower === "") {
            return { visibleIDs, matchedIDs, forcedOpenIDs };
          }

          function walk(item) {
            const selfMatches = item.body.toLocaleLowerCase().includes(queryLower);
            let childHasVisible = false;

            for (const child of item.children) {
              if (walk(child)) {
                childHasVisible = true;
              }
            }

            const isVisible = selfMatches || childHasVisible;
            if (isVisible) {
              visibleIDs.add(item.uuid);
              if (selfMatches) {
                matchedIDs.add(item.uuid);
              }
              if (childHasVisible) {
                forcedOpenIDs.add(item.uuid);
              }
            }

            return isVisible;
          }

          for (const item of items) {
            walk(item);
          }

          return { visibleIDs, matchedIDs, forcedOpenIDs };
        }

        function collectExpandableItems(items, searchActive, searchView, out = []) {
          for (const item of items) {
            const childItems = searchActive
              ? item.children.filter((child) => searchView.visibleIDs.has(child.uuid))
              : item.children;

            if (childItems.length > 0) {
              out.push(item);
              collectExpandableItems(childItems, searchActive, searchView, out);
            }
          }
          return out;
        }

        function collectTreeItems(items, out = []) {
          for (const item of items) {
            out.push(item);
            collectTreeItems(item.children, out);
          }
          return out;
        }

        function collectFavoriteViewRoots(items, out = []) {
          for (const item of items) {
            if (item.is_favorite === true) {
              out.push(item);
            }
            collectFavoriteViewRoots(item.children, out);
          }
          return out;
        }

        function collectVisibleClosedExpandableItems(items, searchActive, searchView, depth = 1, out = []) {
          for (const item of items) {
            const childItems = searchActive
              ? item.children.filter((child) => searchView.visibleIDs.has(child.uuid))
              : item.children;

            if (childItems.length === 0) {
              continue;
            }

            const isOpen = searchActive
              ? searchView.forcedOpenIDs.has(item.uuid)
              : item.is_open;

            if (!isOpen) {
              out.push({ item, depth });
              continue;
            }

            collectVisibleClosedExpandableItems(childItems, searchActive, searchView, depth + 1, out);
          }
          return out;
        }

        function escapeHTML(value) {
          return value
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
        }

        function findMatchRanges(text, query) {
          const ranges = [];
          const q = query.toLocaleLowerCase();
          if (q === "") {
            return ranges;
          }

          const textLower = text.toLocaleLowerCase();
          let fromIndex = 0;
          while (fromIndex < text.length) {
            const foundAt = textLower.indexOf(q, fromIndex);
            if (foundAt < 0) {
              break;
            }
            ranges.push({ start: foundAt, end: foundAt + q.length });
            fromIndex = foundAt + q.length;
          }

          return ranges;
        }

        function highlightedSliceHTML(text, sliceStart, sliceEnd, ranges) {
          let html = "";
          let cursor = sliceStart;

          for (const range of ranges) {
            if (range.end <= sliceStart || range.start >= sliceEnd) {
              continue;
            }

            const hitStart = Math.max(sliceStart, range.start);
            const hitEnd = Math.min(sliceEnd, range.end);

            if (cursor < hitStart) {
              html += escapeHTML(text.slice(cursor, hitStart));
            }
            html += `<mark class="search-hit">${escapeHTML(text.slice(hitStart, hitEnd))}</mark>`;
            cursor = hitEnd;
          }

          if (cursor < sliceEnd) {
            html += escapeHTML(text.slice(cursor, sliceEnd));
          }

          return html;
        }

        function buildHighlightedBodyHTML(text, query) {
          const ranges = findMatchRanges(text, query);
          if (ranges.length === 0) {
            return escapeHTML(text);
          }

          return highlightedSliceHTML(text, 0, text.length, ranges);
        }

        function visibleItemRows() {
          if (!rootEl) {
            return [];
          }

          return Array.from(rootEl.querySelectorAll(".item-row[data-uuid]")).filter((row) => {
            if (!(row instanceof HTMLElement)) {
              return false;
            }
            if (row.closest("[hidden]")) {
              return false;
            }
            return row.getClientRects().length > 0;
          });
        }

        function visibleItemUUIDs() {
          return visibleItemRows()
            .map((row) => row.dataset.uuid || "")
            .filter((uuid) => uuid !== "");
        }

        function itemUUIDNearClientY(clientY) {
          const rows = visibleItemRows();
          if (rows.length === 0) {
            return "";
          }

          let bestUUID = "";
          let bestDistance = Number.POSITIVE_INFINITY;
          for (const row of rows) {
            const uuid = row.dataset.uuid || "";
            if (uuid === "") {
              continue;
            }

            const rect = row.getBoundingClientRect();
            let distance = 0;
            if (clientY < rect.top) {
              distance = rect.top - clientY;
            } else if (clientY > rect.bottom) {
              distance = clientY - rect.bottom;
            }

            if (distance < bestDistance) {
              bestDistance = distance;
              bestUUID = uuid;
            }
          }

          return bestUUID;
        }

        function adjacentItemUUID(uuid, direction) {
          const uuids = visibleItemUUIDs();
          const currentIndex = uuids.indexOf(uuid);
          if (currentIndex < 0) {
            return "";
          }

          const targetIndex = currentIndex + direction;
          if (targetIndex < 0 || targetIndex >= uuids.length) {
            return "";
          }

          return uuids[targetIndex];
        }

        function selectedItemUUIDsInVisibleOrder() {
          const selectedSet = new Set(dragSelectedItemUUIDs);
          if (selectedItemUUID !== "") {
            selectedSet.add(selectedItemUUID);
          }

          return visibleItemUUIDs().filter((uuid) => selectedSet.has(uuid));
        }

        function selectionRootUUIDsInVisibleOrder(selectedUUIDs) {
          const selectedSet = new Set(selectedUUIDs);
          return selectedUUIDs.filter((uuid) => {
            let parentUUID = findParentUUID(outlineItems, uuid) || "";
            while (parentUUID !== "") {
              if (selectedSet.has(parentUUID)) {
                return false;
              }
              parentUUID = findParentUUID(outlineItems, parentUUID) || "";
            }
            return true;
          });
        }

        function fallbackFocusUUIDAfterDelete(selectedUUIDs) {
          const selectedSet = new Set(selectedUUIDs);
          const visible = visibleItemUUIDs();
          let firstSelectedIndex = -1;
          let lastSelectedIndex = -1;

          for (let index = 0; index < visible.length; index += 1) {
            if (!selectedSet.has(visible[index])) {
              continue;
            }
            if (firstSelectedIndex < 0) {
              firstSelectedIndex = index;
            }
            lastSelectedIndex = index;
          }

          if (firstSelectedIndex > 0) {
            return visible[firstSelectedIndex - 1];
          }
          if (lastSelectedIndex >= 0 && lastSelectedIndex < visible.length - 1) {
            return visible[lastSelectedIndex + 1];
          }

          return "";
        }

        function isEditableEventTarget(target) {
          if (!(target instanceof Element)) {
            return false;
          }

          if (
            target instanceof HTMLInputElement ||
            target instanceof HTMLTextAreaElement ||
            target instanceof HTMLSelectElement
          ) {
            return true;
          }

          return target.closest("[contenteditable=\"true\"]") !== null;
        }

        function isFormFieldEventTarget(target) {
          if (!(target instanceof Element)) {
            return false;
          }
          return (
            target instanceof HTMLInputElement ||
            target instanceof HTMLTextAreaElement ||
            target instanceof HTMLSelectElement ||
            target.closest("[contenteditable=\"true\"]") !== null
          );
        }

        function cloneItemForUndo(item) {
          return {
            body: item.body,
            is_open: item.is_open === true,
            is_favorite: item.is_favorite === true,
            children: Array.isArray(item.children)
              ? item.children.map((child) => cloneItemForUndo(child))
              : []
          };
        }

        async function restoreDeletedItemForUndo(snapshotItem, parentUUID, index) {
          const created = parentUUID === ""
            ? await createRootItem()
            : await createChildItem(parentUUID);
          const createdUUID = created.uuid;

          if (snapshotItem.body !== "") {
            await saveItemBody(createdUUID, snapshotItem.body);
          }
          if (snapshotItem.is_favorite === true) {
            await saveItemFavoriteState(createdUUID, true);
          }
          await moveItemToPosition(createdUUID, parentUUID, index);

          for (let childIndex = 0; childIndex < snapshotItem.children.length; childIndex += 1) {
            await restoreDeletedItemForUndo(snapshotItem.children[childIndex], createdUUID, childIndex);
          }

          if (snapshotItem.is_open === false) {
            await saveItemOpenState(createdUUID, false);
          }

          return createdUUID;
        }

        async function deleteSelectedItems(selectedUUIDs) {
          const focusUUID = fallbackFocusUUIDAfterDelete(selectedUUIDs);
          const rootTargets = selectionRootUUIDsInVisibleOrder(selectedUUIDs);
          const deletedSnapshots = rootTargets.map((uuid, order) => {
            const location = requireItemLocation(uuid);
            return {
              order,
              parentUUID: location.parentItem ? location.parentItem.uuid : "",
              parentWasOpen: location.parentItem ? location.parentItem.is_open === true : true,
              index: location.index,
              item: cloneItemForUndo(location.item)
            };
          });
          const deleteTargets = rootTargets.slice().reverse();
          for (const uuid of deleteTargets) {
            await deleteItem(uuid);
          }

          if (!applyingUndo && deletedSnapshots.length > 0) {
            pushUndoAction({
              focusUUID: "",
              apply: async () => {
                const orderedSnapshots = deletedSnapshots.slice().sort((left, right) => {
                  if (left.parentUUID === right.parentUUID) {
                    return left.index - right.index;
                  }
                  return left.order - right.order;
                });
                const parentOpenState = new Map();
                for (const snapshot of orderedSnapshots) {
                  if (snapshot.parentUUID !== "" && snapshot.parentWasOpen === false) {
                    parentOpenState.set(snapshot.parentUUID, false);
                  }
                  await restoreDeletedItemForUndo(snapshot.item, snapshot.parentUUID, snapshot.index);
                }
                for (const [parentUUID, isOpen] of parentOpenState.entries()) {
                  await saveItemOpenState(parentUUID, isOpen);
                }
              }
            });
          }

          keyboardRangeAnchorUUID = "";
          dragSelectedItemUUIDs.clear();
          selectedItemUUID = "";
          await loadOutline(focusUUID);
        }

        async function moveSelectedItems(selectedUUIDs, isOutdent, focusUUID) {
          const moveTargets = selectionRootUUIDsInVisibleOrder(selectedUUIDs);
          const previousPositions = new Map();
          if (!applyingUndo) {
            for (const uuid of moveTargets) {
              previousPositions.set(uuid, itemPositionSnapshot(uuid));
            }
          }
          const moveAction = isOutdent ? outdentItem : indentItem;
          for (const uuid of moveTargets) {
            await moveAction(uuid);
          }
          if (!applyingUndo && moveTargets.length === 1) {
            const movedUUID = moveTargets[0];
            const previousPosition = previousPositions.get(movedUUID);
            if (!previousPosition) {
              await loadOutline(focusUUID);
              return;
            }
            pushUndoAction({
              focusUUID: movedUUID,
              apply: async () => {
                await moveItemToPosition(movedUUID, previousPosition.parentUUID, previousPosition.index);
              }
            });
          }

          await loadOutline(focusUUID);
        }

        async function saveRenderedBodyIfDirty(uuid) {
          if (!rootEl || uuid === "") {
            return true;
          }

          const bodyEl = rootEl.querySelector(`.item-body[data-uuid="${escapeSelectorValue(uuid)}"]`);
          if (!(bodyEl instanceof HTMLElement)) {
            return true;
          }

          const item = findItemByUUID(outlineItems, uuid);
          if (!item) {
            return true;
          }

          const currentBody = (bodyEl.textContent ?? "").trim();
          bodyEl.contentEditable = "false";
          bodyEl.classList.remove("editing");

          if (currentBody === item.body) {
            markItemDirty(uuid, false);
            return true;
          }

          if (currentBody === "") {
            bodyEl.textContent = item.body;
            markItemDirty(uuid, false);
            showError("Item body cannot be empty.");
            return false;
          }

          await saveItemBody(uuid, currentBody);
          markItemDirty(uuid, false);
          clearError();
          return true;
        }

        function placeCaretAtEnd(el) {
          const selection = window.getSelection();
          if (!selection) {
            return;
          }

          const range = document.createRange();
          range.selectNodeContents(el);
          range.collapse(false);
          selection.removeAllRanges();
          selection.addRange(range);
        }

        function focusItemForEditing(uuid, options = {}) {
          const preserveDragSelection = options && options.preserveDragSelection === true;
          if (!rootEl) {
            return;
          }

          const target = rootEl.querySelector(`.item-body[data-uuid="${uuid}"]`);
          if (!(target instanceof HTMLElement)) {
            return;
          }

          target.contentEditable = "true";
          target.classList.add("editing");
          setSelectedItem(uuid, preserveDragSelection);
          suppressFocusChrome(target);
          target.focus();
          placeCaretAtEnd(target);
        }

        async function saveItemBody(uuid, body) {
          const liveItem = findItemByUUID(outlineItems, uuid);
          const previousBody = liveItem ? liveItem.body : null;
          if (previousBody !== null && previousBody === body) {
            return;
          }

          pendingBodySaveCount += 1;
          try {
            if (localMode) {
              const { item } = requireItemLocation(uuid);
              item.body = body;
              item.updated_at = nowTimestamp();
              persistLocalItemsToStorage();
            } else {
              const response = await fetch(`/api/items/${encodeURIComponent(uuid)}`, {
                method: "PATCH",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ body })
              });

              if (!response.ok) {
                throw new Error(`save failed with status ${response.status}`);
              }
            }

            if (liveItem) {
              liveItem.body = body;
              liveItem.updated_at = nowTimestamp();
            }

            const topUndo = peekUndoAction();
            const shouldSkipBodyUndo = previousBody === "" &&
              topUndo &&
              topUndo.kind === "create-item" &&
              topUndo.uuid === uuid;
            if (previousBody !== null && !applyingUndo && !shouldSkipBodyUndo) {
              pushUndoAction({
                kind: "body-update",
                uuid,
                focusUUID: uuid,
                apply: async () => {
                  await saveItemBody(uuid, previousBody);
                }
              });
            }
          } finally {
            pendingBodySaveCount = Math.max(0, pendingBodySaveCount - 1);
          }
        }

        async function saveItemOpenState(uuid, isOpen) {
          if (localMode) {
            const { item } = requireItemLocation(uuid);
            item.is_open = isOpen;
            item.updated_at = nowTimestamp();
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/open-state`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ is_open: isOpen })
          });

          if (!response.ok) {
            throw new Error(`save open state failed with status ${response.status}`);
          }
        }

        async function saveItemFavoriteState(uuid, isFavorite) {
          if (localMode) {
            const { item } = requireItemLocation(uuid);
            item.is_favorite = isFavorite;
            item.updated_at = nowTimestamp();
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/favorite-state`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ is_favorite: isFavorite })
          });

          if (!response.ok) {
            throw new Error(`save favorite state failed with status ${response.status}`);
          }
        }

        async function deleteItem(uuid) {
          if (localMode) {
            if (collectTreeItems(outlineItems, []).length <= 1) {
              throw new Error("cannot delete last item");
            }
            const location = requireItemLocation(uuid);
            location.list.splice(location.index, 1);
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}`, {
            method: "DELETE"
          });

          if (response.status === 409) {
            throw new Error("cannot delete last item");
          }
          if (!response.ok) {
            throw new Error(`delete item failed with status ${response.status}`);
          }
        }

        async function createItemAfterEnter(uuid) {
          if (localMode) {
            const location = requireItemLocation(uuid);
            const newItem = createLocalItem("");
            if (location.item.children.length > 0) {
              location.item.children.unshift(newItem);
              location.item.is_open = true;
              location.item.updated_at = nowTimestamp();
            } else {
              location.list.splice(location.index + 1, 0, newItem);
            }
            persistLocalItemsToStorage();
            return { uuid: newItem.uuid };
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/enter`, {
            method: "POST"
          });

          if (!response.ok) {
            throw new Error(`create item failed with status ${response.status}`);
          }

          return response.json();
        }

        async function createChildItem(uuid) {
          if (localMode) {
            const location = requireItemLocation(uuid);
            const newItem = createLocalItem("");
            location.item.children.unshift(newItem);
            location.item.is_open = true;
            location.item.updated_at = nowTimestamp();
            persistLocalItemsToStorage();
            return { uuid: newItem.uuid };
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/child`, {
            method: "POST"
          });

          if (!response.ok) {
            throw new Error(`create child item failed with status ${response.status}`);
          }

          return response.json();
        }

        async function createRootItem() {
          if (localMode) {
            ensureLocalItemsInitialized();
            const newItem = createLocalItem("");
            localItems.push(newItem);
            persistLocalItemsToStorage();
            return { uuid: newItem.uuid };
          }

          const response = await fetch("/api/items", {
            method: "POST"
          });
          if (!response.ok) {
            throw new Error(`create root item failed with status ${response.status}`);
          }

          return response.json();
        }

        async function indentItem(uuid) {
          if (localMode) {
            const location = requireItemLocation(uuid);
            if (location.index === 0) {
              return;
            }
            const previousSibling = location.list[location.index - 1];
            const movedItem = location.list.splice(location.index, 1)[0];
            previousSibling.children.push(movedItem);
            const timestamp = nowTimestamp();
            previousSibling.is_open = true;
            previousSibling.updated_at = timestamp;
            movedItem.updated_at = timestamp;
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/indent`, {
            method: "POST"
          });
          if (!response.ok) {
            throw new Error(`indent failed with status ${response.status}`);
          }
        }

        async function outdentItem(uuid) {
          if (localMode) {
            const location = requireItemLocation(uuid);
            if (!location.parentItem) {
              return;
            }

            const parentLocation = requireItemLocation(location.parentItem.uuid);
            const movedItem = location.list.splice(location.index, 1)[0];
            parentLocation.list.splice(parentLocation.index + 1, 0, movedItem);

            const timestamp = nowTimestamp();
            movedItem.updated_at = timestamp;
            parentLocation.item.updated_at = timestamp;
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/outdent`, {
            method: "POST"
          });
          if (!response.ok) {
            throw new Error(`outdent failed with status ${response.status}`);
          }
        }

        async function moveItemToPosition(uuid, parentUUID, index) {
          if (!Number.isInteger(index) || index < 0) {
            throw new Error("invalid target position");
          }

          if (localMode) {
            const fromLocation = requireItemLocation(uuid);
            const movedItem = fromLocation.list.splice(fromLocation.index, 1)[0];

            let targetParentItem = null;
            let targetList = outlineItems;
            if (parentUUID !== "") {
              const targetLocation = requireItemLocation(parentUUID);
              targetParentItem = targetLocation.item;
              targetList = targetParentItem.children;
            }

            let targetIndex = index;
            if (targetList === fromLocation.list && fromLocation.index < targetIndex) {
              targetIndex -= 1;
            }
            targetIndex = Math.max(0, Math.min(targetIndex, targetList.length));
            targetList.splice(targetIndex, 0, movedItem);

            const timestamp = nowTimestamp();
            movedItem.updated_at = timestamp;
            if (fromLocation.parentItem) {
              fromLocation.parentItem.updated_at = timestamp;
            }
            if (targetParentItem && targetParentItem !== fromLocation.parentItem) {
              targetParentItem.updated_at = timestamp;
            }
            persistLocalItemsToStorage();
            return;
          }

          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/move`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              parent_uuid: parentUUID === "" ? null : parentUUID,
              child_order: index + 1
            })
          });

          if (!response.ok) {
            throw new Error(`move failed with status ${response.status}`);
          }
        }

        function renderBody(item, renderContext) {
          let savedBody = item.body;
          let handlingEnter = false;

          const body = document.createElement("div");
          body.className = "item-body";
          body.dataset.uuid = item.uuid;
          body.title = itemHoverTitle(item);
          body.contentEditable = "false";
          body.spellcheck = false;

          const isSearchMatch = renderContext.searchActive && renderContext.searchView.matchedIDs.has(item.uuid);
          if (isSearchMatch) {
            body.innerHTML = buildHighlightedBodyHTML(item.body, renderContext.query);
          } else {
            body.textContent = item.body;
          }

          suppressFocusChrome(body);

          function currentBodyText() {
            return (body.textContent ?? "").trim();
          }

          function syncDirtyState() {
            const isEditing = body.contentEditable === "true";
            markItemDirty(item.uuid, isEditing && currentBodyText() !== savedBody);
          }

          body.addEventListener("focus", () => {
            const preserveDragSelection = dragSelectedItemUUIDs.size > 0;
            setSelectedItem(item.uuid, preserveDragSelection);
            suppressFocusChrome(body);
          });

          body.addEventListener("click", () => {
            if (body.contentEditable === "true") {
              return;
            }
            setSelectedItem(item.uuid);
            // Drop highlight markup when entering edit mode.
            body.textContent = item.body;
            body.contentEditable = "true";
            body.classList.add("editing");
            suppressFocusChrome(body);
            body.focus();
            placeCaretAtEnd(body);
            syncDirtyState();
          });

          body.addEventListener("input", () => {
            syncDirtyState();
          });

          function isEnterLikeKey(event) {
            return (
              event.key === "Enter" ||
              event.key === "Return" ||
              event.code === "Enter" ||
              event.code === "NumpadEnter" ||
              event.keyCode === 13
            );
          }

          function handleCreateOnEnter() {
            body.contentEditable = "false";
            body.classList.remove("editing");

            const currentBody = currentBodyText();
            body.textContent = currentBody;
            markItemDirty(item.uuid, currentBody !== savedBody);

            const saveAndCreate = async () => {
              try {
                if (currentBody !== savedBody) {
                  if (currentBody === "") {
                    body.textContent = savedBody;
                    markItemDirty(item.uuid, false);
                    showError("Item body cannot be empty.");
                    return;
                  }

                  try {
                    await saveItemBody(item.uuid, currentBody);
                    savedBody = currentBody;
                    markItemDirty(item.uuid, false);
                    clearError();
                  } catch (error) {
                    body.textContent = savedBody;
                    markItemDirty(item.uuid, false);
                    showError(`Unable to save item: ${String(error)}`);
                    return;
                  }
                }

                const isZoomRoot = renderContext.isZoomView === true && renderContext.zoomItemID === item.uuid;
                const filteredModeActive = renderContext.searchActive || renderContext.favoriteFilterActive || isZoomRoot;
                const liveItem = findItemByUUID(outlineItems, item.uuid);
                const hasChildren = (liveItem ? liveItem.children : item.children).length > 0;
                const createAsChild = filteredModeActive && !hasChildren && !enterCreatedItemUUIDs.has(item.uuid);
                const created = createAsChild
                  ? await createChildItem(item.uuid)
                  : await createItemAfterEnter(item.uuid);
                enterCreatedItemUUIDs.add(created.uuid);
                pushUndoAction({
                  kind: "create-item",
                  uuid: created.uuid,
                  focusUUID: item.uuid,
                  apply: async () => {
                    await deleteItem(created.uuid);
                  }
                });
                if (renderContext.searchActive && searchInputEl instanceof HTMLInputElement) {
                  if (preSearchOpenState instanceof Map) {
                    let cursorUUID = item.uuid;
                    while (cursorUUID !== "") {
                      preSearchOpenState.set(cursorUUID, true);
                      const node = findItemByUUID(outlineItems, cursorUUID);
                      if (node) {
                        node.is_open = true;
                      }
                      cursorUUID = findParentUUID(outlineItems, cursorUUID) || "";
                    }
                  }
                  if (searchInputDebounceID !== 0) {
                    window.clearTimeout(searchInputDebounceID);
                    searchInputDebounceID = 0;
                  }
                  // Keep Enter behavior predictable in search mode by showing the newly created node.
                  searchInputEl.value = "";
                }
                await loadOutline(created.uuid);
              } catch (error) {
                showError(`Unable to create item: ${String(error)}`);
              } finally {
                handlingEnter = false;
              }
            };

            handlingEnter = true;
            void saveAndCreate();
          }

          body.addEventListener("keydown", (event) => {
            const selectedUUIDs = selectedItemUUIDsInVisibleOrder();
            const hasMultipleSelection = selectedUUIDs.length > 1;

            if (
              (event.key === "ArrowUp" || event.key === "ArrowDown") &&
              !event.altKey &&
              !event.ctrlKey &&
              !event.metaKey
            ) {
              event.preventDefault();
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);
              const isRangeSelection = event.shiftKey;
              const moveDirection = event.key === "ArrowUp" ? -1 : 1;
              const targetUUID = adjacentItemUUID(item.uuid, moveDirection);

              const saveAndNavigate = async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                      clearError();
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  if (!isRangeSelection) {
                    keyboardRangeAnchorUUID = "";
                    dragSelectedItemUUIDs.clear();
                  }

                  if (targetUUID !== "") {
                    if (isRangeSelection) {
                      const visibleUUIDList = visibleItemUUIDs();
                      if (keyboardRangeAnchorUUID === "" || !visibleUUIDList.includes(keyboardRangeAnchorUUID)) {
                        keyboardRangeAnchorUUID = item.uuid;
                      }
                      setSelectedItem(targetUUID, true);
                      setRangeSelectionByVisibleOrder(keyboardRangeAnchorUUID, targetUUID);
                    } else {
                      setSelectedItem(targetUUID);
                    }
                    focusItemForEditing(targetUUID, { preserveDragSelection: isRangeSelection });
                  } else {
                    if (isRangeSelection) {
                      const visibleUUIDList = visibleItemUUIDs();
                      if (keyboardRangeAnchorUUID === "" || !visibleUUIDList.includes(keyboardRangeAnchorUUID)) {
                        keyboardRangeAnchorUUID = item.uuid;
                      }
                      setRangeSelectionByVisibleOrder(keyboardRangeAnchorUUID, item.uuid);
                    }
                    focusItemForEditing(item.uuid, { preserveDragSelection: isRangeSelection });
                  }
                } finally {
                  handlingEnter = false;
                }
              };

              handlingEnter = true;
              void saveAndNavigate();
              return;
            }

            if (
              hasMultipleSelection &&
              (event.key === "Backspace" || event.key === "Delete") &&
              !event.altKey &&
              !event.ctrlKey &&
              !event.metaKey
            ) {
              event.preventDefault();
              body.contentEditable = "false";
              body.classList.remove("editing");
              markItemDirty(item.uuid, false);

              handlingEnter = true;
              void (async () => {
                try {
                  await deleteSelectedItems(selectedUUIDs);
                  clearError();
                } catch (error) {
                  showError(`Unable to delete items: ${String(error)}`);
                } finally {
                  handlingEnter = false;
                }
              })();
              return;
            }

            if (renderContext.searchActive && !isEnterLikeKey(event)) {
              return;
            }

            if (
              hasMultipleSelection &&
              event.key === "Tab" &&
              !event.altKey &&
              !event.ctrlKey &&
              !event.metaKey
            ) {
              event.preventDefault();
              if (renderContext.favoriteFilterActive) {
                return;
              }
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);

              handlingEnter = true;
              void (async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  await moveSelectedItems(selectedUUIDs, event.shiftKey, item.uuid);
                  clearError();
                } catch (error) {
                  showError(`Unable to move selected items: ${String(error)}`);
                } finally {
                  handlingEnter = false;
                }
              })();
              return;
            }

            if (event.key === "Backspace") {
              const currentBody = (body.textContent ?? "").trim();
              if (currentBody === "") {
                event.preventDefault();
                body.contentEditable = "false";
                body.classList.remove("editing");
                markItemDirty(item.uuid, false);

                const fallbackFocusUUID = adjacentItemUUID(item.uuid, -1) || adjacentItemUUID(item.uuid, 1);

                handlingEnter = true;
                void (async () => {
                  try {
                    await deleteItem(item.uuid);
                    await loadOutline(fallbackFocusUUID);
                  } catch (error) {
                    showError(`Unable to delete item: ${String(error)}`);
                  } finally {
                    handlingEnter = false;
                  }
                })();
                return;
              }
            }

            if (isEnterLikeKey(event) && !event.shiftKey) {
              event.preventDefault();
              handleCreateOnEnter();
              return;
            }

            if (event.key === "Tab") {
              event.preventDefault();
              const favoriteRootIDs = renderContext.favoriteRootIDs instanceof Set
                ? renderContext.favoriteRootIDs
                : new Set();
              const isFavoriteRoot = favoriteRootIDs.has(item.uuid);
              if (renderContext.favoriteFilterActive && (event.shiftKey || isFavoriteRoot)) {
                return;
              }
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);
              const moveAction = event.shiftKey ? outdentItem : indentItem;
              const previousPosition = itemPositionSnapshot(item.uuid);

              const saveAndMove = async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                      clearError();
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  await moveAction(item.uuid);
                  if (previousPosition) {
                    pushUndoAction({
                      focusUUID: item.uuid,
                      apply: async () => {
                        await moveItemToPosition(item.uuid, previousPosition.parentUUID, previousPosition.index);
                      }
                    });
                  }
                  await loadOutline(item.uuid);
                } catch (error) {
                  showError(`Unable to move item: ${String(error)}`);
                } finally {
                  handlingEnter = false;
                }
              };

              handlingEnter = true;
              void saveAndMove();
            }
          });

          body.addEventListener("beforeinput", (event) => {
            if (event.defaultPrevented || handlingEnter) {
              return;
            }

            }

          body.addEventListener("blur", async () => {

            }

            body.contentEditable = "false";
            body.classList.remove("editing");
            body.textContent = currentBody;

            if (currentBody === savedBody) {
              markItemDirty(item.uuid, false);
              if (renderContext.searchActive) {

              }
              return;
            }
            if (currentBody === "") {
              body.textContent = savedBody;
              markItemDirty(item.uuid, false);
              showError("Item body cannot be empty.");
              if (renderContext.searchActive) {
                renderOutline();
              }
              return;
            }

            try {
              await saveItemBody(item.uuid, currentBody);
              savedBody = currentBody;
              item.body = currentBody;
              markItemDirty(item.uuid, false);
              clearError();
              if (renderContext.searchActive) {
                renderOutline();
              }
            } catch (error) {
              body.textContent = savedBody;
              markItemDirty(item.uuid, false);
              showError(`Unable to save item: ${String(error)}`);
              if (renderContext.searchActive) {
                renderOutline();
              }
            }
          });

          return body;
        }

        function renderTree(items, renderContext) {
          const list = document.createElement("ul");
          list.className = "outline";

          for (const item of items) {
            if (renderContext.searchActive && !renderContext.searchView.visibleIDs.has(item.uuid)) {
              continue;
            }

            const favoriteRootIDs = renderContext.favoriteRootIDs instanceof Set
              ? renderContext.favoriteRootIDs
              : new Set();
            const childItems = item.children.filter((child) => {
              if (renderContext.searchActive && !renderContext.searchView.visibleIDs.has(child.uuid)) {
                return false;
              }
              if (renderContext.favoriteFilterActive && favoriteRootIDs.has(child.uuid)) {
                return false;

            controls.className = "item-controls";

            const isFavoriteRoot = favoriteRootIDs.has(item.uuid);
            const location = findItemLocation(outlineItems, item.uuid);
            const canIndentByStructure = !!location && location.index > 0;
            const canOutdentByStructure = !!location && location.parentItem !== null;
            const canIndentInView = canIndentByStructure && (!renderContext.favoriteFilterActive || !isFavoriteRoot);

              setTopActionsState();
              void (async () => {
                try {

                  if (!canContinue) {

                  }

                  await moveAction(item.uuid);

            controls.appendChild(toggle);
            controls.appendChild(toolTrigger);
            controls.appendChild(toolMenu);

            const bodyNode = renderBody(item, renderContext);
            row.appendChild(controls);
            row.appendChild(bodyNode);
            row.appendChild(outdentBtn);
            row.appendChild(indentBtn);
            listItem.appendChild(row);

            if (hasChildren) {
              const children = document.createElement("div");
              children.className = "item-children";
              children.appendChild(renderTree(childItems, renderContext));
              listItem.appendChild(children);

              const isOpen = renderContext.searchActive
                ? renderContext.searchView.forcedOpenIDs.has(item.uuid)
                : item.is_open;

              children.hidden = !isOpen;
              toggle.textContent = isOpen ? "▾" : "▸";
              toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
              toggle.setAttribute("aria-label", isOpen ? "Collapse children" : "Expand children");

              if (renderContext.searchActive) {
                toggle.disabled = true;
                toggle.setAttribute("aria-label", "Search keeps matching path expanded");
              } else {
                toggle.addEventListener("click", async (event) => {
                  event.preventDefault();
                  event.stopPropagation();
                  setSelectedItem(item.uuid);

                  const nextIsOpen = children.hidden;
                  const prevHidden = children.hidden;
                  children.hidden = !nextIsOpen;
                  toggle.textContent = nextIsOpen ? "▾" : "▸";
                  toggle.setAttribute("aria-expanded", nextIsOpen ? "true" : "false");
                  toggle.setAttribute("aria-label", nextIsOpen ? "Collapse children" : "Expand children");

                  try {
                    await saveItemOpenState(item.uuid, nextIsOpen);
                    item.is_open = nextIsOpen;
                    pushUndoAction({
                      focusUUID: item.uuid,
                      apply: async () => {
                        await saveItemOpenState(item.uuid, !nextIsOpen);
                      }
                    });
                  } catch (error) {
                    children.hidden = prevHidden;
                    const revertedIsOpen = !prevHidden;
                    toggle.textContent = revertedIsOpen ? "▾" : "▸";
                    toggle.setAttribute("aria-expanded", revertedIsOpen ? "true" : "false");
                    toggle.setAttribute("aria-label", revertedIsOpen ? "Collapse children" : "Expand children");
                    showError(`Unable to save open state: ${String(error)}`);
                  }
                });
              }
            }

            list.appendChild(listItem);
          }

          return list;
        }

        function renderEmptyState() {
          const empty = document.createElement("div");
          empty.className = "outline-empty";

          const message = document.createElement("span");
          message.textContent = "No items.";

          const createButton = document.createElement("button");
          createButton.type = "button";
          createButton.className = "outline-empty-create";
          createButton.textContent = "Create first item";
          createButton.setAttribute("aria-label", "Create first item");
          createButton.addEventListener("click", () => {
            if (topActionsBusy) {
              return;
            }

            topActionsBusy = true;
            setTopActionsState();
            void (async () => {
              try {
                const created = await createRootItem();
                pushUndoAction({
                  kind: "create-item",
                  uuid: created.uuid,
                  focusUUID: "",
                  apply: async () => {
                    await deleteItem(created.uuid);
                  }
                });
                if (searchInputEl instanceof HTMLInputElement) {
                  if (searchInputDebounceID !== 0) {
                    window.clearTimeout(searchInputDebounceID);
                    searchInputDebounceID = 0;
                  }
                  searchInputEl.value = "";
                }
                await loadOutline(created.uuid);
                clearError();
              } catch (error) {
                showError(`Unable to create item: ${String(error)}`);
              } finally {
                topActionsBusy = false;
                setTopActionsState();
              }
            })();
          });

          empty.appendChild(message);
          empty.appendChild(createButton);
          return empty;
        }

        function renderFavoritesEmptyState() {
          const empty = document.createElement("div");
          empty.className = "outline-empty";

          const message = document.createElement("span");
          message.textContent = "No favorites.";
          empty.appendChild(message);

          const showAllButton = document.createElement("button");
          showAllButton.type = "button";
          showAllButton.className = "outline-empty-create";
          showAllButton.textContent = "Show all items";
          showAllButton.setAttribute("aria-label", "Show all items");
          showAllButton.addEventListener("click", () => {
            if (topActionsBusy) {
              return;
            }
            favoriteFilterActive = false;
            renderOutline();
          });
          empty.appendChild(showAllButton);

          return empty;
        }

        function renderOutline(focusUUID) {
          if (!errorEl || !rootEl) {
            return;
          }

          if (outlineItems.length === 0) {
            const zoomItemID = zoomItemIDFromURL();
            if (zoomItemID !== "") {
              writeZoomItemIDToURL("", true);
            }

            searchModeActive = false;
            preSearchOpenState = null;
            lastRenderState = {
              baseItems: [],
              searchActive: false,
              searchView: { visibleIDs: new Set(), matchedIDs: new Set(), forcedOpenIDs: new Set() },
              favoriteFilterActive
            };

            rootEl.replaceChildren(renderEmptyState());
            setZoomContextVisible(false, "");
            closeAllToolMenus();
            setTopActionsState();
            clearError();
            return;
          }

          const zoomItemID = zoomItemIDFromURL();
          let baseItems = outlineItems;
          let isZoomView = false;
          let zoomParentUUID = "";
          if (zoomItemID !== "") {
            const zoomedItem = findItemByUUID(outlineItems, zoomItemID);
            if (zoomedItem) {
              baseItems = [zoomedItem];
              isZoomView = true;
              const foundParent = findParentUUID(outlineItems, zoomItemID);
              zoomParentUUID = foundParent || "";
            } else {
              writeZoomItemIDToURL("", true);
            }
          }

          const favoriteViewRoots = favoriteFilterActive ? collectFavoriteViewRoots(baseItems, []) : [];
          const favoriteRootIDs = new Set(favoriteViewRoots.map((item) => item.uuid));
          const renderItems = favoriteFilterActive ? favoriteViewRoots : baseItems;

          const query = activeSearchQuery();
          const nextSearchModeActive = shouldActivateSearch(query);

          if (nextSearchModeActive && !searchModeActive) {
            preSearchOpenState = collectOpenState(renderItems);
            searchModeActive = true;
          } else if (!nextSearchModeActive && searchModeActive) {
            applyOpenState(renderItems, preSearchOpenState);
            preSearchOpenState = null;
            searchModeActive = false;
          }

          const searchView = searchModeActive
            ? collectSearchView(renderItems, query)
            : { visibleIDs: new Set(), matchedIDs: new Set(), forcedOpenIDs: new Set() };

          lastRenderState = {
            baseItems: renderItems,
            searchActive: searchModeActive,
            searchView,
            favoriteFilterActive,
            favoriteRootIDs
          };

          if (favoriteFilterActive && renderItems.length === 0) {
            rootEl.replaceChildren(renderFavoritesEmptyState());
            applySelectedItemUI();
            setZoomContextVisible(false, "");
            closeAllToolMenus();
            setTopActionsState();
            clearError();
            return;
          }

          rootEl.replaceChildren(renderTree(renderItems, {
            searchActive: searchModeActive,
            query,
            searchView,
            favoriteFilterActive,
            favoriteRootIDs,
            isZoomView,
            zoomItemID
          }));
          applySelectedItemUI();

          setZoomContextVisible(isZoomView, zoomParentUUID);
          closeAllToolMenus();
          setTopActionsState();
          clearError();

          if (focusUUID) {
            focusItemForEditing(focusUUID);
          }
        }

        async function loadOutline(focusUUID) {
          if (!errorEl || !rootEl) {
            return;
          }

          try {
            if (localMode) {
              ensureLocalItemsInitialized();
              outlineItems = localItems;
              renderOutline(focusUUID);
              renderMessageStack();
              return;
            }

            const response = await fetch("/api/items");
            if (!response.ok) {
              throw new Error(`request failed with status ${response.status}`);
            }

            const data = await response.json();
            outlineItems = data.items;
            renderOutline(focusUUID);
          } catch (error) {
            if (!localMode) {
              localMode = true;
              ensureLocalItemsInitialized();
              outlineItems = localItems;
              renderOutline(focusUUID);
              clearError();
              renderMessageStack();
              return;
            }
            showError(String(error));
          }
        }

        async function setAllVisibleItemsOpen(isOpen) {
          if (!lastRenderState) {
            return;
          }

          const targets = collectExpandableItems(
            lastRenderState.baseItems,
            lastRenderState.searchActive,
            lastRenderState.searchView
          );

          const changedUUIDs = [];
          for (const item of targets) {
            if (item.is_open === isOpen) {
              continue;
            }
            item.is_open = isOpen;
            changedUUIDs.push(item.uuid);
          }

          renderOutline();
          if (changedUUIDs.length === 0 || searchModeActive) {
            return;
          }

          for (const uuid of changedUUIDs) {
            await saveItemOpenState(uuid, isOpen);
          }
        }

        async function expandVisibleItemsByOneLevel() {
          if (!lastRenderState) {
            return;
          }

          const visibleClosedExpandableItems = collectVisibleClosedExpandableItems(
            lastRenderState.baseItems,
            lastRenderState.searchActive,
            lastRenderState.searchView
          );
          if (visibleClosedExpandableItems.length === 0) {
            return;
          }

          const nextDepth = Math.min(...visibleClosedExpandableItems.map((entry) => entry.depth));
          const changedUUIDs = [];
          for (const entry of visibleClosedExpandableItems) {
            if (entry.depth !== nextDepth || entry.item.is_open) {
              continue;
            }
            entry.item.is_open = true;
            changedUUIDs.push(entry.item.uuid);
          }

          renderOutline();
          if (changedUUIDs.length === 0 || searchModeActive) {
            return;
          }

          for (const uuid of changedUUIDs) {
            await saveItemOpenState(uuid, true);
          }
        }

        function initTopActions() {
          if (undoBtnEl instanceof HTMLButtonElement) {
            undoBtnEl.addEventListener("click", () => {
              void performUndo();
            });
          }

          if (expandAllBtnEl instanceof HTMLButtonElement) {
            expandAllBtnEl.addEventListener("click", () => {
              if (topActionsBusy || searchModeActive) {
                return;
              }
              topActionsBusy = true;
              setTopActionsState();
              void (async () => {
                try {
                  await setAllVisibleItemsOpen(true);
                  clearError();
                } catch (error) {
                  showError(`Unable to expand all: ${String(error)}`);
                } finally {
                  topActionsBusy = false;
                  setTopActionsState();
                }
              })();
            });
          }

          if (expandLevelBtnEl instanceof HTMLButtonElement) {
            expandLevelBtnEl.addEventListener("click", () => {
              if (topActionsBusy || searchModeActive) {
                return;
              }
              topActionsBusy = true;
              setTopActionsState();
              void (async () => {
                try {
                  await expandVisibleItemsByOneLevel();
                  clearError();
                } catch (error) {
                  showError(`Unable to expand next level: ${String(error)}`);
                } finally {
                  topActionsBusy = false;
                  setTopActionsState();
                }
              })();
            });
          }

          if (favoriteItemBtnEl instanceof HTMLButtonElement) {
            favoriteItemBtnEl.addEventListener("click", () => {
              if (topActionsBusy || !lastRenderState) {
                return;
              }

              favoriteFilterActive = !favoriteFilterActive;
              renderOutline();
              clearError();
            });
          }

          if (collapseAllBtnEl instanceof HTMLButtonElement) {
            collapseAllBtnEl.addEventListener("click", () => {
              if (topActionsBusy || searchModeActive) {
                return;
              }
              topActionsBusy = true;
              setTopActionsState();
              void (async () => {
                try {
                  await setAllVisibleItemsOpen(false);
                  clearError();
                } catch (error) {
                  showError(`Unable to collapse all: ${String(error)}`);
                } finally {
                  topActionsBusy = false;
                  setTopActionsState();
                }
              })();
            });
          }

          setTopActionsState();
        }

        function initSearchControls() {
          if (searchInputEl instanceof HTMLInputElement) {
            searchInputEl.addEventListener("input", () => {
              if (searchInputDebounceID !== 0) {
                window.clearTimeout(searchInputDebounceID);
              }

              searchInputDebounceID = window.setTimeout(() => {
                searchInputDebounceID = 0;
                renderOutline();
              }, 100);
            });
          }
        }

        document.addEventListener("keydown", (event) => {
          if (
            (event.metaKey || event.ctrlKey) &&
            !event.altKey &&
            !event.shiftKey &&
            event.key.toLocaleLowerCase() === "z"
          ) {
            if (!isEditableEventTarget(event.target)) {
              event.preventDefault();
              void performUndo();
            }
            return;
          }

          if (event.defaultPrevented) {
            return;
          }
          if (event.altKey || event.ctrlKey || event.metaKey) {
            return;
          }
          if (event.shiftKey && (event.key === "ArrowUp" || event.key === "ArrowDown")) {
            if (isFormFieldEventTarget(event.target)) {
              return;
            }

            const visibleUUIDList = visibleItemUUIDs();
            if (visibleUUIDList.length === 0) {
              return;
            }

            event.preventDefault();
            dragSelectionActive = false;
            dragSelectionAnchorUUID = "";

            let activeUUID = selectedItemUUID;
            if (!visibleUUIDList.includes(activeUUID)) {
              activeUUID = "";
            }
            if (activeUUID === "") {
              activeUUID = event.key === "ArrowUp"
                ? visibleUUIDList[visibleUUIDList.length - 1]
                : visibleUUIDList[0];
            }

            if (activeUUID === "") {
              return;
            }

            if (keyboardRangeAnchorUUID === "" || !visibleUUIDList.includes(keyboardRangeAnchorUUID)) {
              keyboardRangeAnchorUUID = activeUUID;
            }

            const direction = event.key === "ArrowUp" ? -1 : 1;
            const adjacentUUID = adjacentItemUUID(activeUUID, direction);
            const targetUUID = adjacentUUID || activeUUID;
            setSelectedItem(targetUUID, true);
            setRangeSelectionByVisibleOrder(keyboardRangeAnchorUUID, targetUUID);
            return;
          }

          if (event.key !== "Backspace" && event.key !== "Delete" && event.key !== "Tab") {
            return;
          }
          if (isFormFieldEventTarget(event.target)) {
            return;
          }

          const selectedUUIDs = selectedItemUUIDsInVisibleOrder();
          if (selectedUUIDs.length <= 1) {
            return;
          }

          event.preventDefault();
          if (event.key === "Tab" && favoriteFilterActive) {
            return;
          }
          if (topActionsBusy) {
            return;
          }

          topActionsBusy = true;
          setTopActionsState();
          void (async () => {
            try {
              if (event.key === "Backspace") {
                await deleteSelectedItems(selectedUUIDs);
              } else if (event.key === "Delete") {
                await deleteSelectedItems(selectedUUIDs);
              } else {
                await moveSelectedItems(selectedUUIDs, event.shiftKey, selectedUUIDs[0]);
              }
              clearError();
            } catch (error) {
              if (event.key === "Backspace" || event.key === "Delete") {
                showError(`Unable to delete items: ${String(error)}`);
              } else {
                showError(`Unable to move selected items: ${String(error)}`);
              }
            } finally {
              topActionsBusy = false;
              setTopActionsState();
            }
          })();
        });

        document.addEventListener("click", (event) => {
          const clickTarget = event.target instanceof Element ? event.target : null;
          closeAllToolMenus();
          closeThemeMenu();
          closeMessageStackMenu();
          if (
            clickTarget &&
            (clickTarget.closest("#debug-json-panel") || clickTarget.closest("#debug-toolbar-state-btn"))
          ) {
            return;
          }
          closeDebugJSONPanel();
        });
        if (rootEl) {
          rootEl.addEventListener("mousedown", (event) => {
            if (event.button !== 0) {
              return;
            }
            if (!(event.target instanceof Element)) {
              return;
            }
            if (event.target.closest(".item-controls")) {
              return;
            }
            if (event.target.closest(".item-mobile-move")) {
              return;
            }
            if (event.target.closest(".item-tool-menu")) {
              return;
            }
            if (event.target.closest(".item-body.editing")) {
              return;
            }
            if (event.target.closest("button, a, input, select, textarea")) {
              return;
            }
            startDragSelectionAtClientY(event.clientY);
          });
        }
        window.addEventListener("beforeunload", (event) => {
          if (!hasUnsavedChanges()) {
            return;
          }

          event.preventDefault();
          event.returnValue = "";
        });
        window.addEventListener("popstate", () => {
          syncDebugModeFromURL();
          void loadOutline();
        });
        window.addEventListener("mousemove", (event) => {
          if (!dragSelectionActive) {
            return;
          }
          if ((event.buttons & 1) === 0) {
            dragSelectionActive = false;
            dragSelectionAnchorUUID = "";
            return;
          }
          updateDragSelectionAtClientY(event.clientY);
        });
        window.addEventListener("mouseup", () => {
          if (!dragSelectionActive) {
            return;
          }
          dragSelectionActive = false;
          dragSelectionAnchorUUID = "";
        });

        initDebugToolbar();
        initThemeControls();
        initMessageStackControls();
        initDevAutoReload();
        initSearchControls();
        initTopActions();
        void loadOutline();
      })();
    </script>
  </body>
</html>
