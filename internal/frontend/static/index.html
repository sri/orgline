      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-bg);
      }

      .top-controls {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
      }

      .top-actions {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }

      .top-action {
        width: 1.5rem;
        height: 1.35rem;
        padding: 0;
        border-radius: 4px;
        border: 1px solid var(--control-border);
        background: var(--control-bg);
        color: var(--control-text);
        font-size: 0.85rem;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .top-action:hover {
        background: color-mix(in srgb, var(--control-bg) 72%, #000000 28%);
      }

      .top-action:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .top-action:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .top-action.is-active {
        background: color-mix(in srgb, var(--control-bg) 68%, #ffffff 32%);
      }

      .top-action.is-favorite-active {
        color: var(--favorite-active);
      }

      .top-action.heart-toggle {
        line-height: 1;
      }

      .top-action-divider {
        width: 1px;
        height: 0.95rem;
        background: color-mix(in srgb, var(--control-border) 82%, #000000 18%);
        opacity: 0.9;
      }

      .message-stack {
        position: relative;
        display: inline-flex;
        align-items: center;
        min-width: 0;
        max-width: 18rem;
        flex: 1 1 auto;
      }

      .message-stack[hidden] {
        display: none;
      }

      .message-stack-trigger {
        width: 100%;
        height: 1.35rem;
        border-radius: 6px;
        border: 1px solid var(--message-warning-border);
        background: var(--message-warning-bg);
        color: var(--message-warning-text);
        font-size: 0.69rem;
        font-weight: 600;
        line-height: 1;
        padding: 0 0.42rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        text-align: left;
      }

      .message-stack-trigger:hover {
        background: color-mix(in srgb, var(--message-warning-bg) 82%, #000000 18%);
      }

      .message-stack-trigger:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .message-stack-trigger.is-error {
        border-color: var(--message-error-border);
        background: var(--message-error-bg);
        color: var(--message-error-text);
      }

      .message-stack-trigger.is-error:hover {
        background: color-mix(in srgb, var(--message-error-bg) 82%, #000000 18%);
      }

      .message-stack-count {
        min-width: 1.05rem;
        height: 0.9rem;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, currentColor 72%, transparent 28%);
        padding: 0 0.25rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.62rem;
        line-height: 1;
        flex: 0 0 auto;
      }

      .message-stack-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .message-stack-menu {
        position: absolute;
        top: calc(100% + 0.24rem);
        right: 0;
        width: min(24rem, 82vw);
        max-height: min(18rem, 60vh);
        overflow-y: auto;
        border: 1px solid var(--control-border);
        border-radius: 8px;
        background: var(--tool-menu-bg);
        box-shadow: 0 10px 24px #00000030;
        z-index: 230;
        padding: 0.34rem;
      }

      .message-stack-menu[hidden] {
        display: none;
      }

      .message-stack-item {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        border-radius: 6px;
        border: 1px solid var(--message-warning-border);
        background: var(--message-warning-bg);
        color: var(--message-warning-text);
        padding: 0.3rem 0.38rem;
      }

      .message-stack-item + .message-stack-item {
        margin-top: 0.28rem;
      }

      .message-stack-item.is-error {
        border-color: var(--message-error-border);
        background: var(--message-error-bg);
        color: var(--message-error-text);
      }

      .message-stack-item-level {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex: 0 0 auto;
      }

      .message-stack-item-text {
        font-size: 0.68rem;
        line-height: 1.25;
        flex: 1 1 auto;
      }

      .message-stack-dismiss {
        width: 1rem;
        height: 1rem;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, currentColor 72%, transparent 28%);
        background: transparent;
        color: inherit;
        font-size: 0.66rem;
        line-height: 1;
        padding: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .message-stack-dismiss:hover {
        background: color-mix(in srgb, currentColor 16%, transparent 84%);
      }

      .message-stack-dismiss:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .theme-menu-trigger {
        width: 1.35rem;
        height: 1.15rem;
        padding: 0;
        border-radius: 4px;
        border: 1px solid var(--control-border);
        background: var(--control-bg);
        color: var(--control-text);
        font-size: 0.78rem;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .theme-menu-trigger:hover {
        background: color-mix(in srgb, var(--control-bg) 72%, #000000 28%);
      }

      .theme-menu-trigger:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .theme-menu {
        position: absolute;
        top: calc(100% + 0.2rem);
        right: 0;
        min-width: 9.5rem;
        max-height: min(19rem, 55vh);
        overflow-y: auto;
        border: 1px solid var(--control-border);
        border-radius: 7px;
        background: var(--tool-menu-bg);
        box-shadow: 0 10px 22px #0000002b;
        z-index: 220;
        padding: 0.2rem;
      }

      .theme-menu[hidden] {
        display: none;
      }

      .theme-menu-item {
        width: 100%;
        height: 1.35rem;
        border: none;
        border-radius: 5px;
        background: transparent;
        color: var(--tool-menu-text);
        font-size: 0.73rem;
        text-align: left;
        padding: 0 0.38rem;
        cursor: pointer;
      }

      .theme-menu-item:hover {
        background: var(--tool-menu-hover-bg);
      }

      .theme-menu-item:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .theme-menu-item.is-selected {
        font-weight: 600;
      }

      .page {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 12px;
        box-sizing: border-box;
      }

      main {
        width: min(42rem, 92vw);
        border: 1px solid var(--main-border);
        border-radius: 14px;
        background: var(--main-bg);
        backdrop-filter: blur(4px);
        padding: 1.8rem;
        box-shadow: 0 12px 30px var(--main-shadow);
      }

      .outline {
        margin: 0;
        padding-left: 1rem;
        list-style: none;
      }

      #outline-root {
        background: transparent;
      }

      .outline ul {
        margin: 0;
        padding-left: 1rem;
        list-style: none;
      }

      .item-row {
        display: inline-flex;
        align-items: stretch;
        gap: 0;
        margin: 0.2rem 0;
        color: var(--text-color);
        border-radius: 6px;
      }

      .item-controls {
        position: relative;
        display: inline-flex;
        align-items: stretch;
        border-radius: 6px 0 0 6px;
        background: var(--toggle-bg);
        user-select: none;
        -webkit-user-select: none;
      }

      .item-controls.is-leaf {
        background: var(--toggle-leaf-bg);
      }

      .item-tool-trigger {
        width: 1.05rem;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border: none;
        border-radius: 0;
        border-left: 1px solid var(--controls-divider);
        background: transparent;
        color: var(--toggle-text);
        font-size: 0.62rem;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-mobile-move {
        display: none;
        width: 1rem;
        align-self: stretch;
        place-items: center;
        padding: 0;
        border: none;
        background: var(--toggle-bg);
        color: var(--toggle-text);
        font-size: 0.6rem;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-mobile-move.is-outdent {
        border-left: 1px solid var(--controls-divider);
      }

      .item-mobile-move.is-indent {
        border-radius: 0 6px 6px 0;
        border-left: 1px solid var(--controls-divider);
      }

      .item-mobile-move:hover {
        background: var(--controls-segment-hover);
      }

      .item-mobile-move:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 1px;
      }

      .item-mobile-move:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .item-tool-trigger:hover {
        background: var(--controls-segment-hover);
      }

      .item-tool-trigger:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 1px;
      }

      .item-tool-menu {
        position: absolute;
        top: calc(100% + 0.12rem);
        right: 0;
        display: inline-flex;
        align-items: center;
        gap: 0.18rem;
        min-width: 0;
        background: var(--toggle-bg);
        border: 1px solid var(--controls-divider);
        border-radius: 7px;
        box-shadow: 0 8px 20px #00000026;
        padding: 0.2rem;
        z-index: 50;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-tool-menu[hidden] {
        display: none;
      }

      .item-tool-option {
        width: 1.35rem;
        height: 1.1rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        color: var(--toggle-text);
        text-align: center;
        padding: 0;
        border-radius: 5px;
        font-size: 0.8rem;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-tool-option:hover {
        background: var(--controls-segment-hover);
      }

      .item-tool-option:focus-visible {
        outline: 1px solid var(--tool-focus);
        outline-offset: 0;
      }

      .item-tool-option.heart-option {
        font-size: 0.78rem;
      }

      .item-tool-option.heart-option.is-active {
        color: var(--favorite-active);
      }

      .heart-icon {
        width: 0.8rem;
        height: 0.8rem;
        display: block;
        pointer-events: none;
      }

      .item-tool-option.heart-option .heart-icon {
        margin: 0 auto;
      }

      .item-tool-option.zoom-option {
        font-size: 0.82rem;
      }

      .item-toggle {
        width: 1.05rem;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border: none;
        border-radius: 6px 0 0 6px;
        background: transparent;
        color: var(--toggle-text);
        font-size: 0.72rem;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-toggle:hover {
        background: var(--controls-segment-hover);
      }

      .item-toggle:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 1px;
      }

      .item-toggle.is-leaf {
        cursor: default;
        opacity: 1;
        color: #f4f7fb00;
      }

      .item-children {
        margin-left: 1.25rem;
      }

      .item-body {
        display: inline-block;
        padding: 0.15rem 0.45rem;
        border-radius: 0;
        background: transparent;
        border: none;
        min-width: 1rem;
        min-height: 1.35rem;
        white-space: pre-wrap;
        transition: background-color 120ms ease;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-body:hover {
        background: var(--item-body-hover-bg);
      }

      .item-body.editing {
        background: var(--item-body-editing-bg);
        user-select: text;
        -webkit-user-select: text;
      }

      .item-body:focus,
      .item-body:focus-visible,
      .item-body[contenteditable="true"],
      .item-body[contenteditable="true"]:focus,
      .item-body[contenteditable="true"]:focus-visible {
        outline: none !important;
        border: none !important;
        box-shadow: none !important;
        -webkit-box-shadow: none !important;
        -webkit-appearance: none;
        appearance: none;
      }

      .item-body[contenteditable="true"] {
        user-select: text;
        -webkit-user-select: text;
      }

      .item-row.is-selected .item-body {
        background: var(--item-selected-bg);
      }

      .item-row.is-drag-selected .item-body {
        background: var(--item-selected-bg);
      }

      .item-row.is-selected .item-controls {
        background: var(--toggle-bg);
      }

      .item-row.is-selected .item-controls.is-leaf {
        background: var(--toggle-leaf-bg);
      }

      .item-row.is-selected .item-toggle {
        border-left-color: var(--controls-divider);
      }

      .item-row.is-selected .item-mobile-move {
        display: inline-grid;
      }

      .error {
        color: var(--error-color);
        font-weight: 600;
      }

      .outline-empty {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.35rem 0.15rem;
        color: var(--text-muted);
      }

      .outline-empty-create {
        border: 1px solid var(--controls-divider);
        border-radius: 6px;
        background: var(--toggle-bg);
        color: var(--toggle-text);
        font-size: 0.75rem;
        padding: 0.22rem 0.55rem;
        cursor: pointer;
      }

      .outline-empty-create:hover {
        background: var(--controls-segment-hover);
      }

      .outline-empty-create:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 0;
      }

      .outline-toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.5rem;
        margin: 0 0 0.75rem 0;
        padding: 0.35rem 0.45rem;
        border-radius: 8px;
        background: var(--toggle-bg);
        color: var(--toggle-text);
        position: sticky;
        top: 0.25rem;
        z-index: 150;
      }

      .toolbar-right {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 0;
        flex: 0 0 auto;
      }

      .outline-search {
        width: 100px;
        height: 1.35rem;
        border-radius: 5px;
        border: 1px solid var(--controls-divider);
        background: color-mix(in srgb, var(--toggle-bg) 72%, #ffffff 28%);
        color: var(--toggle-text);
        font-size: 16px;
        padding: 0 0.42rem;
      }

      .outline-search::placeholder {
        color: color-mix(in srgb, var(--toggle-text) 72%, transparent 28%);
      }

      .outline-search:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 0;
      }

      .search-hit {
        background: var(--search-hit-bg);
        color: var(--search-hit-text);
        border-radius: 3px;
        padding: 0;
      }

      .zoom-context {
        margin: 0 0 0.75rem 0;
        font-size: 0.8rem;
        color: var(--text-color);
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
      }

      .zoom-context[hidden] {
        display: none;
      }

      .zoom-home-link {
        color: var(--toggle-bg);
        text-decoration: none;
        font-weight: 600;
      }

      .zoom-home-link:hover {
        text-decoration: underline;
      }

      .debug-toolbar {
        margin: 0.9rem 0 0 0;
        padding: 0.35rem 0.45rem;
        border-radius: 8px;
        border: 1px solid var(--debug-border);
        background: var(--debug-bg);
        color: var(--debug-text);
        display: flex;
        width: 100%;
        box-sizing: border-box;
        align-items: center;
        justify-content: flex-start;
        gap: 0.45rem;
        font-size: 0.74rem;
        line-height: 1.2;
        position: sticky;
        bottom: 0.25rem;
        z-index: 150;
      }

      .debug-toolbar[hidden] {
        display: none;
      }

      .debug-toolbar-close {
        margin-left: auto;
        width: 1.35rem;
        height: 1.35rem;
        padding: 0;
        border-radius: 999px;
        border: 1px solid var(--debug-close-border);
        background: var(--debug-close-bg);
        color: var(--debug-close-text);
        font-size: 0.82rem;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
      }

      .debug-toolbar-close:hover {
        background: color-mix(in srgb, var(--debug-close-bg) 82%, #000000 18%);
      }

      .debug-toolbar-close:focus-visible {
        outline: 1px solid var(--debug-close-border);
        outline-offset: 0;
      }

      .debug-toolbar-action {
        height: 1.35rem;
        padding: 0 0.45rem;
        border-radius: 5px;
        border: 1px solid var(--debug-action-border);
        background: var(--debug-action-bg);
        color: var(--debug-action-text);
        font-size: 0.72rem;
        font-weight: 700;
        cursor: pointer;
      }

      .debug-toolbar-action:hover {
        background: color-mix(in srgb, var(--debug-action-bg) 82%, #000000 18%);
      }

      .debug-toolbar-action:focus-visible {
        outline: 1px solid var(--debug-action-border);
        outline-offset: 0;
      }

      .debug-json-panel {
        margin: 0.35rem 0 0 0;
        padding: 0.36rem;
        border-radius: 8px;
        border: 1px solid var(--debug-action-border);
        background: var(--debug-panel-bg);
      }

      .debug-json-panel[hidden] {
        display: none;
      }

      .debug-json-panel-header {
        display: flex;
        justify-content: flex-end;
        margin: 0 0 0.24rem 0;
      }

      .debug-json-copy-btn {
        height: 1.2rem;
        padding: 0 0.42rem;
        border-radius: 5px;
        border: 1px solid var(--debug-action-border);
        background: var(--debug-action-bg);
        color: var(--debug-action-text);
        font-size: 0.68rem;
        font-weight: 700;
        cursor: pointer;
      }

      .debug-json-copy-btn:hover {
        background: color-mix(in srgb, var(--debug-action-bg) 82%, #000000 18%);
      }

      .debug-json-copy-btn:focus-visible {
        outline: 1px solid var(--debug-action-border);
        outline-offset: 0;
      }

      .debug-json-viewer {
        margin: 0;
        color: var(--debug-text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.7rem;
        line-height: 1.35;
        white-space: pre-wrap;
        overflow: auto;
        max-height: 18rem;
        cursor: text;
        user-select: text;
        -webkit-user-select: text;
      }

      @media (max-width: 720px) {
        .outline-toolbar {
          flex-wrap: nowrap;
        }

        .message-stack {
          max-width: 2.4rem;
          flex: 0 0 auto;
        }

        .message-stack-trigger {
          justify-content: center;
          padding: 0 0.2rem;
        }

        .message-stack-label {
          display: none;
        }

        .message-stack-menu {
          position: fixed;
          top: calc(env(safe-area-inset-top, 0px) + 3rem);
          left: 50%;
          right: auto;
          transform: translateX(-50%);
          width: min(24rem, calc(100vw - 0.8rem));
          max-height: min(18rem, calc(100vh - 4.2rem));
        }

        .toolbar-right {
          width: auto;
          margin-left: auto;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main>
        <div class="outline-toolbar">
          <div class="top-actions" aria-label="Outline controls">
            <button
              id="undo-btn"
              class="top-action"
              type="button"
              title="Undo"
              aria-label="Undo"
            >↶</button>
            <span class="top-action-divider" aria-hidden="true"></span>
            <button
              id="expand-all-btn"
              class="top-action"
              type="button"
              title="Expand all"
              aria-label="Expand all"
            >▾</button>
            <button
              id="collapse-all-btn"
              class="top-action"
              type="button"
              title="Collapse all"
              aria-label="Collapse all"
            >▸</button>
            <button
              id="expand-level-btn"
              class="top-action"
              type="button"
              title="Expand next level"
              aria-label="Expand next level"
            >↧</button>
            <span class="top-action-divider" aria-hidden="true"></span>
            <button
              id="favorite-item-btn"
              class="top-action heart-toggle"
              type="button"
              title="Show favorites only"
              aria-label="Show favorites only"
            ></button>
          </div>
          <div id="message-stack" class="message-stack" hidden>
            <button
              id="message-stack-trigger"
              class="message-stack-trigger"
              type="button"
              title="Messages"
              aria-label="Messages"
              aria-haspopup="dialog"
              aria-expanded="false"
            ></button>
            <div id="message-stack-menu" class="message-stack-menu" hidden></div>
          </div>
          <div class="toolbar-right">
            <input
              id="outline-search"
              class="outline-search"
              type="search"
              placeholder="Search"
              aria-label="Search items"
            />
            <div class="top-controls">
              <button
                id="theme-menu-trigger"
                class="theme-menu-trigger"
                type="button"
                title="Theme menu"
                aria-label="Theme menu"
                aria-haspopup="menu"
                aria-expanded="false"
              >◐</button>
              <div id="theme-menu" class="theme-menu" role="menu" hidden></div>
            </div>
          </div>
        </div>
        <div id="zoom-context" class="zoom-context" hidden>
          <a id="zoom-home-link" class="zoom-home-link" href="/">Back to all items</a>
          <a id="zoom-parent-link" class="zoom-home-link" href="" hidden>Go to parent</a>
        </div>
        <div id="outline-root"></div>
        <p id="outline-error" class="error" hidden></p>
        <div id="debug-toolbar" class="debug-toolbar" hidden>
          <button
            id="debug-toolbar-errors-btn"
            class="debug-toolbar-action"
            type="button"
            title="Generate a test message"
            aria-label="Generate a test message"
          >Errors</button>
          <button
            id="debug-toolbar-state-btn"
            class="debug-toolbar-action"
            type="button"
            title="Show current JSON state"
            aria-label="Show current JSON state"
          >State</button>
          <button
            id="debug-toolbar-close-btn"
            class="debug-toolbar-close"
            type="button"
            title="Turn debug mode off"
            aria-label="Turn debug mode off"
          >×</button>
        </div>
        <div id="debug-json-panel" class="debug-json-panel" hidden>
          <div class="debug-json-panel-header">
            <button
              id="debug-json-copy-btn"
              class="debug-json-copy-btn"
              type="button"
              title="copy state to clipboard"
              aria-label="copy state to clipboard"
            >copy state to clipboard</button>
          </div>
          <pre
            id="debug-json-viewer"
            class="debug-json-viewer"
            contenteditable="true"
            spellcheck="false"
            aria-label="Debug JSON state"
          ></pre>
        </div>
      </main>
    </div>
    <script>
      (() => {
        const errorEl = document.getElementById("outline-error");
        const rootEl = document.getElementById("outline-root");
        const zoomContextEl = document.getElementById("zoom-context");
        const zoomHomeLinkEl = document.getElementById("zoom-home-link");
        const zoomParentLinkEl = document.getElementById("zoom-parent-link");
        const undoBtnEl = document.getElementById("undo-btn");
        const expandAllBtnEl = document.getElementById("expand-all-btn");
        const expandLevelBtnEl = document.getElementById("expand-level-btn");
        const collapseAllBtnEl = document.getElementById("collapse-all-btn");
        const favoriteItemBtnEl = document.getElementById("favorite-item-btn");
        const messageStackEl = document.getElementById("message-stack");
        const messageStackTriggerEl = document.getElementById("message-stack-trigger");
        const messageStackMenuEl = document.getElementById("message-stack-menu");
        const themeMenuTriggerEl = document.getElementById("theme-menu-trigger");
        const themeMenuEl = document.getElementById("theme-menu");
        const searchInputEl = document.getElementById("outline-search");
        const debugToolbarEl = document.getElementById("debug-toolbar");
        const debugToolbarCloseBtnEl = document.getElementById("debug-toolbar-close-btn");
        const debugToolbarErrorsBtnEl = document.getElementById("debug-toolbar-errors-btn");
        const debugToolbarStateBtnEl = document.getElementById("debug-toolbar-state-btn");
        const debugJSONPanelEl = document.getElementById("debug-json-panel");
        const debugJSONViewerEl = document.getElementById("debug-json-viewer");
        const debugJSONCopyBtnEl = document.getElementById("debug-json-copy-btn");
        const themeStorageKey = "orgline-theme";
        const debugModeStorageKey = "orgline-debug-mode-v1";
        const localItemsStorageKey = "orgline-items-v1";
        const messageDismissalsStorageKey = "orgline-message-dismissals-v1";
        const localModeMessageID = "local-mode-warning";
        const zoomQueryParam = "item_id";
        const debugQueryParam = "debug";
        const searchMinChars = 2;
        let localMode = (() => {
          const value = (new URLSearchParams(window.location.search).get("local") || "").trim().toLowerCase();
          return value === "true" || value === "1" || value === "yes";
        })();
        let debugModeEnabled = false;

        let outlineItems = [];
        let localItems = [];
        let localItemsInitialized = false;
        let searchModeActive = false;
        let preSearchOpenState = null;
        let searchInputDebounceID = 0;
        let pendingBodySaveCount = 0;
        let selectedItemUUID = "";
        const dirtyEditingItemIDs = new Set();
        const dragSelectedItemUUIDs = new Set();
        let dragSelectionActive = false;
        let dragSelectionAnchorUUID = "";
        let keyboardRangeAnchorUUID = "";
        let favoriteFilterActive = false;
        let topActionsBusy = false;
        let lastRenderState = null;
        const enterCreatedItemUUIDs = new Set();
        const undoStack = [];
        const maxUndoDepth = 200;
        let applyingUndo = false;
        let stackMessageCounter = 0;
        const stackMessages = [];
        let messageDismissals = {};
        let debugMessageSequence = 0;

        const themes = [
          { id: "default", label: "default" },
          { id: "dark", label: "dark" },
          { id: "matrix", label: "matrix" },
          { id: "ocean", label: "ocean" },
          { id: "solar", label: "solar" },
          { id: "graphite", label: "graphite" }
        ];

        function applyTheme(themeID) {
          const normalizedTheme = themeID === "wolfram-dark" ? "dark" : themeID;
          const selectedTheme = themes.some((theme) => theme.id === normalizedTheme) ? normalizedTheme : "default";
          document.documentElement.dataset.theme = selectedTheme;
          try {
            localStorage.setItem(themeStorageKey, selectedTheme);
          } catch (_error) {
            // Best effort only.
          }

          rebuildThemeMenu(selectedTheme);
          renderMessageStack();
        }

        function closeThemeMenu() {
          if (!(themeMenuEl instanceof HTMLElement) || !(themeMenuTriggerEl instanceof HTMLButtonElement)) {
            return;
          }
          themeMenuEl.hidden = true;
          themeMenuTriggerEl.setAttribute("aria-expanded", "false");
        }

        function rebuildThemeMenu(selectedThemeID) {
          if (!(themeMenuEl instanceof HTMLElement) || !(themeMenuTriggerEl instanceof HTMLButtonElement)) {
            return;
          }

          themeMenuTriggerEl.textContent = "◐";
          themeMenuEl.replaceChildren();
          const selectedTheme = themes.find((theme) => theme.id === selectedThemeID) || themes[0];
          if (!selectedTheme) {
            return;
          }

          for (const theme of themes) {
            const themeItem = document.createElement("button");
            themeItem.type = "button";
            themeItem.className = "theme-menu-item";
            themeItem.setAttribute("role", "menuitemradio");
            const isSelected = theme.id === selectedTheme.id;
            themeItem.setAttribute("aria-checked", isSelected ? "true" : "false");
            themeItem.classList.toggle("is-selected", isSelected);
            themeItem.textContent = isSelected ? `✓ ${theme.label}` : theme.label;
            themeItem.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              applyTheme(theme.id);
              closeThemeMenu();
            });
            themeMenuEl.appendChild(themeItem);
          }
        }

        function initThemeControls() {
          if (!(themeMenuEl instanceof HTMLElement) || !(themeMenuTriggerEl instanceof HTMLButtonElement)) {
            return;
          }

          themeMenuTriggerEl.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const willOpen = themeMenuEl.hidden;
            closeAllToolMenus();
            closeMessageStackMenu();
            closeDebugJSONPanel();
            themeMenuEl.hidden = !willOpen;
            themeMenuTriggerEl.setAttribute("aria-expanded", willOpen ? "true" : "false");
          });
          themeMenuEl.addEventListener("click", (event) => {
            event.stopPropagation();
          });

          let storedTheme = "default";
          try {
            storedTheme = localStorage.getItem(themeStorageKey) || "default";
          } catch (_error) {
            storedTheme = "default";
          }
          applyTheme(storedTheme);
        }

        function parseBooleanQueryValue(value) {
          const normalized = typeof value === "string" ? value.trim().toLowerCase() : "";
          if (normalized === "true" || normalized === "1" || normalized === "yes" || normalized === "on") {
            return true;
          }
          if (normalized === "false" || normalized === "0" || normalized === "no" || normalized === "off") {
            return false;
          }
          return null;
        }

        function debugModeFromQuery() {
          const raw = new URLSearchParams(window.location.search).get(debugQueryParam);
          return parseBooleanQueryValue(raw);
        }

        function isLocalDebugHost() {
          const hostname = typeof window.location.hostname === "string"
            ? window.location.hostname.trim().toLowerCase()
            : "";
          return (
            hostname === "localhost" ||
            hostname === "127.0.0.1" ||
            hostname === "::1" ||
            hostname.endsWith(".local")
          );
        }

        function loadStoredDebugMode() {
          try {
            return parseBooleanQueryValue(localStorage.getItem(debugModeStorageKey));
          } catch (_error) {
            return null;
          }
        }

        function persistDebugMode(enabled) {
          try {
            localStorage.setItem(debugModeStorageKey, enabled ? "true" : "false");
          } catch (_error) {
            // Best effort only.
          }
        }

        function renderDebugToolbar() {
          if (!(debugToolbarEl instanceof HTMLElement)) {
            return;
          }

          debugToolbarEl.hidden = !debugModeEnabled;
          if (debugToolbarEl.hidden) {
            closeDebugJSONPanel();
            return;
          }
        }

        function closeDebugJSONPanel() {
          if (!(debugJSONPanelEl instanceof HTMLElement)) {
            return;
          }
          debugJSONPanelEl.hidden = true;
        }

        function buildDebugStatePayload() {

              }

          return {
            local_mode: false,
            source: "memory:outlineItems",
            items: outlineItems

        async function copyTextToClipboard(text) {
          if (typeof text !== "string" || text === "") {
            return false;
          }

          if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
            try {
              await navigator.clipboard.writeText(text);
              return true;
            } catch (_error) {
              // Fall through to selection-based copy.
            }
          }

          try {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            textarea.style.top = "0";
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            const copied = document.execCommand("copy");
            document.body.removeChild(textarea);
            return copied;
          } catch (_error) {
            return false;
          }

        function loadMessageDismissals() {
          try {
            const encoded = localStorage.getItem(messageDismissalsStorageKey);
            if (!encoded) {
              return {};
            }
            const parsed = JSON.parse(encoded);
            if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
              return {};
            }
            const normalized = {};
            for (const [rawKey, value] of Object.entries(parsed)) {
              if (value !== true || typeof rawKey !== "string") {
                continue;
              }
              const key = rawKey.trim();
              if (key === "") {
                continue;
              }
              const legacySeparatorIndex = key.lastIndexOf("::");
              const dismissKey = legacySeparatorIndex > 0 ? key.slice(legacySeparatorIndex + 2).trim() : key;
              if (dismissKey !== "") {
                normalized[dismissKey] = true;
              }
            }
            return normalized;
          } catch (_error) {
            return {};
          }
        }

        function persistMessageDismissals() {
          try {
            localStorage.setItem(messageDismissalsStorageKey, JSON.stringify(messageDismissals));
          } catch (_error) {
            // Best effort only.
          }
        }

        function dismissToken(dismissKey) {
          if (typeof dismissKey !== "string") {
            return "";
          }
          return dismissKey.trim();
        }

        function isMessageDismissed(message) {
          if (!message || !message.dismissKey) {
            return false;
          }
          const token = dismissToken(message.dismissKey);
          return token !== "" && messageDismissals[token] === true;
        }

        function dismissMessage(message) {
          if (!message || !message.dismissKey) {
            return;
          }
          const token = dismissToken(message.dismissKey);
          if (token === "") {
            return;
          }
          messageDismissals[token] = true;
          persistMessageDismissals();
        }

        function addOrUpdateStackMessage(message) {
          const id = typeof message.id === "string" ? message.id.trim() : "";
          const text = typeof message.text === "string" ? message.text.trim() : "";
          if (id === "" || text === "") {
            return;
          }

          const normalized = {
            id,
            level: message.level === "warning" ? "warning" : "error",
            text,
            dismissible: message.dismissible !== false,
            persistent: message.persistent === true,
            dismissKey: typeof message.dismissKey === "string" ? message.dismissKey.trim() : "",
            createdAt: Date.now()
          };

          const existingIndex = stackMessages.findIndex((entry) => entry.id === id);
          if (existingIndex >= 0) {
            stackMessages[existingIndex] = { ...stackMessages[existingIndex], ...normalized };
            return;
          }

          stackMessages.unshift(normalized);
          if (stackMessages.length > 40) {
            for (let index = stackMessages.length - 1; index >= 0; index -= 1) {
              if (stackMessages[index].persistent) {
                continue;
              }
              stackMessages.splice(index, 1);
              if (stackMessages.length <= 40) {
                break;
              }
            }
          }
        }

        function removeStackMessageByID(id) {
          const index = stackMessages.findIndex((entry) => entry.id === id);
          if (index < 0) {
            return;
          }
          stackMessages.splice(index, 1);
        }

        function upsertLocalModeWarningMessage() {
          if (!localMode) {
            removeStackMessageByID(localModeMessageID);
            return;
          }

          addOrUpdateStackMessage({
            id: localModeMessageID,
            level: "warning",
            text: "Local mode is active. Data is stored in this browser's local storage.",
            dismissible: true,
            persistent: true,
            dismissKey: localModeMessageID
          });
        }

        function visibleStackMessages() {
          return stackMessages.filter((message) => !isMessageDismissed(message));
        }

        function closeMessageStackMenu() {
          if (!(messageStackMenuEl instanceof HTMLElement) || !(messageStackTriggerEl instanceof HTMLButtonElement)) {
            return;

          messageStackMenuEl.hidden = true;
          messageStackTriggerEl.setAttribute("aria-expanded", "false");
        }

        function renderMessageStack() {
          if (
            !(messageStackEl instanceof HTMLElement) ||
            !(messageStackTriggerEl instanceof HTMLButtonElement) ||
            !(messageStackMenuEl instanceof HTMLElement)
          ) {
            return;
          }

          upsertLocalModeWarningMessage();

          const messages = visibleStackMessages();
          if (messages.length === 0) {
            messageStackEl.hidden = true;
            closeMessageStackMenu();
            return;
          }

          messageStackEl.hidden = false;

          const topErrorMessage = messages.find((message) => message.level === "error");
          const topMessage = topErrorMessage || messages[0];
          const topIsError = topMessage.level === "error";

          messageStackTriggerEl.classList.toggle("is-error", topIsError);
          messageStackTriggerEl.classList.toggle("is-warning", !topIsError);
          messageStackTriggerEl.title = `${messages.length} message${messages.length === 1 ? "" : "s"}`;
          messageStackTriggerEl.setAttribute(
            "aria-label",
            `${messages.length} message${messages.length === 1 ? "" : "s"}`
          );
          messageStackTriggerEl.replaceChildren();

          const countEl = document.createElement("span");
          countEl.className = "message-stack-count";
          countEl.textContent = String(messages.length);

          const labelEl = document.createElement("span");
          labelEl.className = "message-stack-label";
          const prefix = topIsError ? "Error" : "Warning";
          if (messages.length === 1) {
            labelEl.textContent = `${prefix}: ${topMessage.text}`;
          } else {
            labelEl.textContent = `${messages.length} messages: ${topMessage.text}`;
          }

          messageStackTriggerEl.append(countEl, labelEl);

          messageStackMenuEl.replaceChildren();
          for (const message of messages) {
            const itemEl = document.createElement("div");
            itemEl.className = "message-stack-item";
            itemEl.classList.toggle("is-error", message.level === "error");

            const levelEl = document.createElement("span");
            levelEl.className = "message-stack-item-level";
            levelEl.textContent = message.level === "error" ? "ERROR" : "WARNING";

            const textEl = document.createElement("span");
            textEl.className = "message-stack-item-text";
            textEl.textContent = message.text;

            itemEl.append(levelEl, textEl);

            if (message.dismissible) {
              const dismissBtn = document.createElement("button");
              dismissBtn.type = "button";
              dismissBtn.className = "message-stack-dismiss";
              dismissBtn.textContent = "×";
              dismissBtn.title = "Dismiss message";
              dismissBtn.setAttribute("aria-label", "Dismiss message");
              dismissBtn.addEventListener("click", (event) => {
                event.preventDefault();
                event.stopPropagation();
                if (message.persistent && message.dismissKey) {
                  dismissMessage(message);
                } else {
                  removeStackMessageByID(message.id);
                }
                renderMessageStack();
              });
              itemEl.appendChild(dismissBtn);
            }

            messageStackMenuEl.appendChild(itemEl);
          }
        }

        function pushStackMessage(level, text, options = {}) {
          const normalizedText = typeof text === "string" ? text.trim() : "";
          if (normalizedText === "") {
            return;
          }

          const normalizedLevel = level === "warning" ? "warning" : "error";
          let id = typeof options.id === "string" ? options.id.trim() : "";
          if (id === "") {
            const duplicate = stackMessages.find((message) => (
              !message.persistent &&
              message.level === normalizedLevel &&
              message.text === normalizedText
            ));
            if (duplicate) {
              duplicate.createdAt = Date.now();
              renderMessageStack();
              return;
            }
            stackMessageCounter += 1;
            id = `message-${stackMessageCounter}`;
          }

          addOrUpdateStackMessage({
            id,
            level: normalizedLevel,
            text: normalizedText,
            dismissible: options.dismissible !== false,
            persistent: options.persistent === true,
            dismissKey: typeof options.dismissKey === "string" ? options.dismissKey : ""
          });
          renderMessageStack();
        }

        function initMessageStackControls() {
          if (
            !(messageStackEl instanceof HTMLElement) ||
            !(messageStackTriggerEl instanceof HTMLButtonElement) ||
            !(messageStackMenuEl instanceof HTMLElement)
          ) {

          }

          messageDismissals = loadMessageDismissals();

          messageStackTriggerEl.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();

        function initDevAutoReload() {
          if (localMode || globalThis.__ORGLINE_DEV_MODE !== true) {
            return;
          }

          let lastBuildID = typeof globalThis.__ORGLINE_DEV_BUILD_ID === "string"
            ? globalThis.__ORGLINE_DEV_BUILD_ID
            : "";

          window.setInterval(async () => {
            try {
              const response = await fetch("/api/dev/build", {
                cache: "no-store"
              });
              if (!response.ok) {
                return;
              }

              const payload = await response.json();
              if (!payload || typeof payload.build_id !== "string" || payload.build_id === "") {
                return;
              }

              if (lastBuildID !== "" && payload.build_id !== lastBuildID) {
                window.location.reload();
                return;
              }

              lastBuildID = payload.build_id;
            } catch (_error) {
              // Ignore transient dev-reload failures while the server restarts.
            }
          }, 700);
        }

        function nowTimestamp() {
          return new Date().toISOString();
        }

        function parseAppTimestamp(value) {
          const raw = typeof value === "string" ? value.trim() : "";
          if (raw === "") {
            return null;
          }

          const normalized = raw.includes("T") ? raw : `${raw.replace(" ", "T")}Z`;
          const parsed = new Date(normalized);
          if (Number.isNaN(parsed.getTime())) {
            return null;
          }
          return parsed;
        }

        function relativeDateString(value) {
          const date = parseAppTimestamp(value);
          if (!date) {
            return "unknown";
          }

          const deltaMs = date.getTime() - Date.now();
          const absMs = Math.abs(deltaMs);
          const minuteMs = 60 * 1000;
          const hourMs = 60 * minuteMs;
          const dayMs = 24 * hourMs;
          const weekMs = 7 * dayMs;
          const monthMs = 30 * dayMs;
          const yearMs = 365 * dayMs;

          let unit = "minute";
          let valueByUnit = deltaMs / minuteMs;
          if (absMs < minuteMs) {
            unit = "second";
            valueByUnit = deltaMs / 1000;
          } else if (absMs < hourMs) {
            unit = "minute";
            valueByUnit = deltaMs / minuteMs;
          } else if (absMs < dayMs) {
            unit = "hour";
            valueByUnit = deltaMs / hourMs;
          } else if (absMs < weekMs) {
            unit = "day";
            valueByUnit = deltaMs / dayMs;
          } else if (absMs < monthMs) {
            unit = "week";
            valueByUnit = deltaMs / weekMs;
          } else if (absMs < yearMs) {
            unit = "month";
            valueByUnit = deltaMs / monthMs;
          } else {
            unit = "year";
            valueByUnit = deltaMs / yearMs;
          }

          const rounded = Math.round(valueByUnit);
          try {
            const formatter = new Intl.RelativeTimeFormat(undefined, { numeric: "auto" });
            return formatter.format(rounded, unit);
          } catch (_error) {
            if (rounded === 0) {
              return "now";
            }
            const suffix = rounded > 0 ? "from now" : "ago";
            return `${Math.abs(rounded)} ${unit}${Math.abs(rounded) === 1 ? "" : "s"} ${suffix}`;
          }
        }

        function itemHoverTitle(item) {
          const numChildren = Array.isArray(item.children) ? item.children.length : 0;
          return `uuid: ${item.uuid}\ncreated at: ${relativeDateString(item.created_at)}\nupdated at: ${relativeDateString(item.updated_at)}\nnum children: ${numChildren}`;
        }

        function generateUUID() {
          if (globalThis.crypto && typeof globalThis.crypto.randomUUID === "function") {
            return globalThis.crypto.randomUUID();
          }

          const randomPart = Math.random().toString(16).slice(2, 14);
          const secondPart = Math.random().toString(16).slice(2, 14);
          return `${randomPart.slice(0, 8)}-${randomPart.slice(8, 12)}-4${secondPart.slice(0, 3)}-a${secondPart.slice(3, 6)}-${randomPart.slice(0, 4)}${secondPart.slice(6, 12)}`;
        }

        function createLocalItem(body = "") {
          const timestamp = nowTimestamp();
          return {
            uuid: generateUUID(),
            created_at: timestamp,
            updated_at: timestamp,
            body,
            is_open: true,
            is_favorite: false,
            children: []
          };

        function buildLocalDemoItems() {
          const root1 = createLocalItem("Outliner Demo");
          const root1Child1 = createLocalItem("Click to edit any item");
          const root1Child2 = createLocalItem("Use Enter to create items");
          const root1Grandchild1 = createLocalItem("Shift+Enter inserts a newline");
          root1Child2.children.push(root1Grandchild1);
          root1.children.push(root1Child1, root1Child2);

          const root2 = createLocalItem("Local Mode");
          const root2Child1 = createLocalItem("No backend requests in ?local=true");
          const root2Child2 = createLocalItem("Reload keeps local data");
          root2.children.push(root2Child1, root2Child2);

          return [root1, root2];
        }

        function cloneLocalStorageItem(item) {
          return {
            uuid: item.uuid,
            created_at: item.created_at,
            updated_at: item.updated_at,
            body: item.body,
            is_open: item.is_open === true,
            is_favorite: item.is_favorite === true,
            children: Array.isArray(item.children) ? item.children.map((child) => cloneLocalStorageItem(child)) : []
          };
        }

        function normalizeLocalStorageItem(rawItem, seenUUIDs) {
          if (!rawItem || typeof rawItem !== "object") {
            return null;
          }

          const timestamp = nowTimestamp();
          let uuid = typeof rawItem.uuid === "string" ? rawItem.uuid.trim() : "";
          if (uuid === "" || seenUUIDs.has(uuid)) {
            uuid = generateUUID();
          }
          seenUUIDs.add(uuid);

          const createdAt = typeof rawItem.created_at === "string" && rawItem.created_at.trim() !== ""
            ? rawItem.created_at.trim()
            : timestamp;
          const updatedAt = typeof rawItem.updated_at === "string" && rawItem.updated_at.trim() !== ""
            ? rawItem.updated_at.trim()
            : createdAt;

          const children = [];
          if (Array.isArray(rawItem.children)) {
            for (const rawChild of rawItem.children) {
              const child = normalizeLocalStorageItem(rawChild, seenUUIDs);
              if (child) {
                children.push(child);
              }
            }
          }

          return {
            uuid,
            created_at: createdAt,
            updated_at: updatedAt,
            body: typeof rawItem.body === "string" ? rawItem.body : "",
            is_open: rawItem.is_open !== false,
            is_favorite: rawItem.is_favorite === true,
            children
          };
        }

        function readLocalItemsFromStorage() {
          try {
            const encoded = localStorage.getItem(localItemsStorageKey);
            if (!encoded) {
              return null;
            }

            const parsed = JSON.parse(encoded);
            const rawItems = Array.isArray(parsed)
              ? parsed
              : parsed && typeof parsed === "object" && Array.isArray(parsed.items)
                ? parsed.items
                : null;
            if (!rawItems) {
              return null;
            }

            const seenUUIDs = new Set();
            const items = rawItems
              .map((rawItem) => normalizeLocalStorageItem(rawItem, seenUUIDs))
              .filter((item) => item !== null);
            if (items.length === 0) {
              return null;
            }

            return items;
          } catch (_error) {
            return null;
          }
        }

        function persistLocalItemsToStorage() {
          if (!localMode || !localItemsInitialized) {
            return;
          }

          try {
            const payload = {
              version: 1,
              saved_at: nowTimestamp(),
              items: localItems.map((item) => cloneLocalStorageItem(item))
            };
            localStorage.setItem(localItemsStorageKey, JSON.stringify(payload));
          } catch (_error) {
            // Best effort only.
          }
        }

        function ensureLocalItemsInitialized() {
          if (localItemsInitialized) {
            return;
          }
          const storedItems = readLocalItemsFromStorage();
          localItems = storedItems || buildLocalDemoItems();
          localItemsInitialized = true;
          persistLocalItemsToStorage();
        }

        function suppressFocusChrome(el) {

          el.style.setProperty("border", "none", "important");
          el.style.setProperty("box-shadow", "none", "important");
          el.style.setProperty("-webkit-box-shadow", "none", "important");
        }

        function clearError() {

        function heartIconMarkup(isActive) {

          }
          return `<svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

        function setHeartIcon(button, isActive) {
