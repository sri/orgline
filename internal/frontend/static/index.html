<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orgline</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color-scheme: light;
        --page-bg:
          radial-gradient(circle at 10% 20%, #f9e5c5 0%, transparent 42%),
          radial-gradient(circle at 90% 80%, #d5f0d7 0%, transparent 45%),
          linear-gradient(120deg, #f7f3eb, #f3f8ff);
        --top-bar-bg: #0000000d;
        --top-bar-border: #00000014;
        --main-bg: #ffffffcc;
        --main-border: #1d2a331a;
        --main-shadow: #0e25310d;
        --text-color: #1c2833;
        --item-body-bg: #d9d9dc;
        --item-body-hover-bg: #e6e6e9;
        --item-body-editing-bg: #4f76d933;
        --item-selected-bg: #9db8e173;
        --item-selected-divider: #5577a8;
        --search-hit-bg: #5f8cf266;
        --search-hit-text: #12284f;
        --toggle-bg: #2f5f66;
        --toggle-hover-bg: #3d7580;
        --toggle-focus: #5b97a0;
        --toggle-leaf-bg: #8da8ac;
        --toggle-text: #f4f7fb;
        --controls-segment-hover: #0000001a;
        --controls-divider: #0000004a;
        --tool-bg: #0f1217;
        --tool-hover-bg: #242930;
        --tool-focus: #65768d;
        --tool-text: #f2f4f8;
        --tool-menu-bg: #fbfcff;
        --tool-menu-border: #00000038;
        --tool-menu-text: #1e2833;
        --tool-menu-hover-bg: #edf2f9;
        --control-bg: #ffffffca;
        --control-border: #0000002f;
        --control-text: #1d2a33;
        --control-focus: #5b97a0;
        --error-color: #8a1c1c;
      }

      :root[data-theme="default"] {
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at 15% 8%, #2e343f 0%, transparent 35%),
          radial-gradient(circle at 88% 88%, #3a2417 0%, transparent 44%),
          linear-gradient(130deg, #101318, #171d25);
        --top-bar-bg: #0f1319;
        --top-bar-border: #2f3946;
        --main-bg: #171c24eb;
        --main-border: #3b4657;
        --main-shadow: #00000066;
        --text-color: #e9edf5;
        --item-body-bg: #2a3342;
        --item-body-hover-bg: #343f50;
        --item-body-editing-bg: #4da2ff42;
        --item-selected-bg: #ffad5475;
        --item-selected-divider: #dc7d1d;
        --search-hit-bg: #6ab0ff70;
        --search-hit-text: #0b1524;
        --toggle-bg: #f6881f;
        --toggle-hover-bg: #ff9e3f;
        --toggle-focus: #ffd2a1;
        --toggle-leaf-bg: #7a5a32;
        --toggle-text: #1c212b;
        --controls-segment-hover: #00000018;
        --controls-divider: #00000052;
        --tool-bg: #262f3e;
        --tool-hover-bg: #354257;
        --tool-focus: #f6881f;
        --tool-text: #eef3ff;
        --tool-menu-bg: #222a37;
        --tool-menu-border: #4d5c70;
        --tool-menu-text: #eef3ff;
        --tool-menu-hover-bg: #2d3849;
        --control-bg: #222a36;
        --control-border: #4a566a;
        --control-text: #eef3ff;
        --control-focus: #f6881f;
        --error-color: #ff9ca8;
      }

      :root[data-theme="matrix"] {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at 15% 10%, #003114 0%, transparent 35%),
          radial-gradient(circle at 90% 90%, #001f0d 0%, transparent 40%),
          linear-gradient(140deg, #020503, #06140a);
        --top-bar-bg: #031108;
        --top-bar-border: #0a3d1e;
        --main-bg: #04170ddf;
        --main-border: #0f5f30;
        --main-shadow: #00000080;
        --text-color: #9af3ba;
        --item-body-bg: #0f2b1b;
        --item-body-hover-bg: #143824;
        --item-body-editing-bg: #b867ff40;
        --item-selected-bg: #3fd47a66;
        --item-selected-divider: #1ea753;
        --search-hit-bg: #dd78ff75;
        --search-hit-text: #17041f;
        --toggle-bg: #21b654;
        --toggle-hover-bg: #2bd166;
        --toggle-focus: #7effac;
        --toggle-leaf-bg: #246b3c;
        --toggle-text: #04110a;
        --controls-segment-hover: #0000001b;
        --controls-divider: #00000055;
        --tool-bg: #0f2518;
        --tool-hover-bg: #153723;
        --tool-focus: #52df81;
        --tool-text: #9af3ba;
        --tool-menu-bg: #0b2315;
        --tool-menu-border: #2a8a4f;
        --tool-menu-text: #9af3ba;
        --tool-menu-hover-bg: #13331f;
        --control-bg: #0b2014;
        --control-border: #1b6e3b;
        --control-text: #9af3ba;
        --control-focus: #52df81;
        --error-color: #ff8f8f;
      }

      :root[data-theme="ocean"] {
        color-scheme: light;
        --page-bg:
          radial-gradient(circle at 12% 12%, #d8f0ff 0%, transparent 40%),
          radial-gradient(circle at 84% 86%, #d9fff3 0%, transparent 42%),
          linear-gradient(125deg, #f0f8ff, #edf8f6);
        --top-bar-bg: #e8f7ff;
        --top-bar-border: #b6d8ea;
        --main-bg: #fbfeffed;
        --main-border: #9ec2d8;
        --main-shadow: #1f4a621f;
        --text-color: #1d3448;
        --item-body-bg: #d6e8f4;
        --item-body-hover-bg: #e0eef8;
        --item-body-editing-bg: #ff9b5a36;
        --item-selected-bg: #8bc4e075;
        --item-selected-divider: #4e90b7;
        --search-hit-bg: #ffb48380;
        --search-hit-text: #3f1f0e;
        --toggle-bg: #2a6f97;
        --toggle-hover-bg: #3b87b3;
        --toggle-focus: #5ca7d8;
        --toggle-leaf-bg: #8bb0c8;
        --toggle-text: #f2fbff;
        --controls-segment-hover: #00000016;
        --controls-divider: #00000045;
        --tool-bg: #153851;
        --tool-hover-bg: #1c4e70;
        --tool-focus: #5ca7d8;
        --tool-text: #e9f7ff;
        --tool-menu-bg: #f9fcff;
        --tool-menu-border: #96b8cb;
        --tool-menu-text: #1f3e54;
        --tool-menu-hover-bg: #e8f2f9;
        --control-bg: #ffffffd1;
        --control-border: #8fb4c9;
        --control-text: #1f3e54;
        --control-focus: #5ca7d8;
        --error-color: #9a2130;
      }

      :root[data-theme="solar"] {
        color-scheme: light;
        --page-bg:
          radial-gradient(circle at 14% 14%, #fff4cc 0%, transparent 45%),
          radial-gradient(circle at 90% 88%, #fde2d0 0%, transparent 45%),
          linear-gradient(120deg, #fffaf2, #fff3eb);
        --top-bar-bg: #fff0dd;
        --top-bar-border: #e7c8a2;
        --main-bg: #fffef8ef;
        --main-border: #dabd94;
        --main-shadow: #6740161f;
        --text-color: #3d2a1a;
        --item-body-bg: #f4dec6;
        --item-body-hover-bg: #f9e6d1;
        --item-body-editing-bg: #5b79e03a;
        --item-selected-bg: #f0c59173;
        --item-selected-divider: #ce8f4a;
        --search-hit-bg: #7797ff6e;
        --search-hit-text: #101f4c;
        --toggle-bg: #d5792e;
        --toggle-hover-bg: #e08e4c;
        --toggle-focus: #f0b67d;
        --toggle-leaf-bg: #c39d7c;
        --toggle-text: #fff5ea;
        --controls-segment-hover: #00000019;
        --controls-divider: #0000004a;
        --tool-bg: #6e4525;
        --tool-hover-bg: #875834;
        --tool-focus: #e08e4c;
        --tool-text: #fff3e7;
        --tool-menu-bg: #fffaf0;
        --tool-menu-border: #cca97b;
        --tool-menu-text: #553621;
        --tool-menu-hover-bg: #f9efd9;
        --control-bg: #fff7ebd4;
        --control-border: #cb9f69;
        --control-text: #553621;
        --control-focus: #e08e4c;
        --error-color: #8a1c1c;
      }

      :root[data-theme="graphite"] {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at 10% 8%, #36373f 0%, transparent 36%),
          radial-gradient(circle at 90% 88%, #2b2c31 0%, transparent 40%),
          linear-gradient(130deg, #18191d, #24262d);
        --top-bar-bg: #202228;
        --top-bar-border: #3f4551;
        --main-bg: #2a2c34e8;
        --main-border: #4d5563;
        --main-shadow: #00000066;
        --text-color: #f0f2f7;
        --item-body-bg: #3b3f4a;
        --item-body-hover-bg: #484d59;
        --item-body-editing-bg: #6fc4ff3f;
        --item-selected-bg: #a4b5d069;
        --item-selected-divider: #6f84a8;
        --search-hit-bg: #90d5ff76;
        --search-hit-text: #0f1d2a;
        --toggle-bg: #7f8aa3;
        --toggle-hover-bg: #97a5c4;
        --toggle-focus: #c8d0e3;
        --toggle-leaf-bg: #697185;
        --toggle-text: #15171b;
        --controls-segment-hover: #0000001b;
        --controls-divider: #00000053;
        --tool-bg: #2c323d;
        --tool-hover-bg: #394250;
        --tool-focus: #97a5c4;
        --tool-text: #edf2ff;
        --tool-menu-bg: #2e3440;
        --tool-menu-border: #626c81;
        --tool-menu-text: #edf2ff;
        --tool-menu-hover-bg: #3a4352;
        --control-bg: #2f3440;
        --control-border: #5b6578;
        --control-text: #f2f5fc;
        --control-focus: #97a5c4;
        --error-color: #ffafb0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-bg);
      }

      .top-bar {
        height: 20px;
        width: 100%;
        background: var(--top-bar-bg);
        border-bottom: 1px solid var(--top-bar-border);
        display: flex;
        justify-content: center;
      }

      .top-bar-inner {
        width: min(42rem, 92vw);
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .top-controls {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .top-controls select {
        height: 1rem;
        padding: 0 0.2rem;
        border-radius: 4px;
        border: 1px solid var(--control-border);
        background: var(--control-bg);
        color: var(--control-text);
        font-size: 0.62rem;
      }

      .top-controls select:focus-visible {
        outline: 1px solid var(--control-focus);
        outline-offset: 0;
      }

      .page {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 12px;
        box-sizing: border-box;
      }

      main {
        width: min(42rem, 92vw);
        border: 1px solid var(--main-border);
        border-radius: 14px;
        background: var(--main-bg);
        backdrop-filter: blur(4px);
        padding: 1.8rem;
        box-shadow: 0 12px 30px var(--main-shadow);
      }

      .outline {
        margin: 0;
        padding-left: 1rem;
        list-style: none;
      }

      #outline-root {
        background: transparent;
      }

      .outline ul {
        margin: 0;
        padding-left: 1rem;
        list-style: none;
      }

      .item-row {
        display: inline-flex;
        align-items: stretch;
        gap: 0;
        margin: 0.2rem 0;
        color: var(--text-color);
        border-radius: 6px;
      }

      .item-controls {
        position: relative;
        display: inline-flex;
        align-items: stretch;
        border-radius: 6px 0 0 6px;
        background: var(--toggle-bg);
        user-select: none;
        -webkit-user-select: none;
      }

      .item-controls.is-leaf {
        background: var(--toggle-leaf-bg);
      }

      .item-tool-trigger {
        width: 1.05rem;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border: none;
        border-radius: 6px 0 0 6px;
        background: transparent;
        color: var(--toggle-text);
        font-size: 0.62rem;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-tool-trigger:hover {
        background: var(--controls-segment-hover);
      }

      .item-tool-trigger:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 1px;
      }

      .item-tool-menu {
        position: absolute;
        top: calc(100% + 0.12rem);
        left: 0;
        min-width: 6.1rem;
        background: var(--toggle-bg);
        border: 1px solid var(--controls-divider);
        border-radius: 7px;
        box-shadow: 0 8px 20px #00000026;
        padding: 0.2rem;
        z-index: 50;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-tool-option {
        width: 100%;
        border: none;
        background: transparent;
        color: var(--toggle-text);
        text-align: left;
        padding: 0.25rem 0.35rem;
        border-radius: 5px;
        font-size: 0.72rem;
        line-height: 1.15;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-tool-option:hover {
        background: var(--controls-segment-hover);
      }

      .item-tool-option:focus-visible {
        outline: 1px solid var(--tool-focus);
        outline-offset: 0;
      }

      .item-toggle {
        width: 1.05rem;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        border-left: 1px solid var(--controls-divider);
        color: var(--toggle-text);
        font-size: 0.72rem;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-toggle:hover {
        background: var(--controls-segment-hover);
      }

      .item-toggle:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 1px;
      }

      .item-toggle.is-leaf {
        cursor: default;
        opacity: 1;
        color: #f4f7fb00;
      }

      .item-children {
        margin-left: 1.25rem;
      }

      .item-body {
        display: inline-flex;
        align-items: center;
        padding: 0.15rem 0.45rem;
        border-radius: 0 6px 6px 0;
        background: transparent;
        border: none;
        min-width: 1rem;
        min-height: 1.35rem;
        white-space: pre-wrap;
        transition: background-color 120ms ease;
        user-select: none;
        -webkit-user-select: none;
      }

      .item-body:hover {
        background: var(--item-body-hover-bg);
      }

      .item-body.editing {
        background: var(--item-body-editing-bg);
        user-select: text;
        -webkit-user-select: text;
      }

      .item-body:focus,
      .item-body:focus-visible,
      .item-body[contenteditable="true"],
      .item-body[contenteditable="true"]:focus,
      .item-body[contenteditable="true"]:focus-visible {
        outline: none !important;
        border: none !important;
        box-shadow: none !important;
        -webkit-box-shadow: none !important;
        -webkit-appearance: none;
        appearance: none;
      }

      .item-body[contenteditable="true"] {
        user-select: text;
        -webkit-user-select: text;
      }

      .item-row.is-selected .item-body {
        background: var(--item-selected-bg);
      }

      .item-row.is-selected .item-controls {
        background: var(--toggle-bg);
      }

      .item-row.is-selected .item-controls.is-leaf {
        background: var(--toggle-leaf-bg);
      }

      .item-row.is-selected .item-toggle {
        border-left-color: var(--controls-divider);
      }

      .error {
        color: var(--error-color);
        font-weight: 600;
      }

      .outline-toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.5rem;
        margin: 0 0 0.75rem 0;
        padding: 0.35rem 0.45rem;
        border-radius: 8px;
        background: var(--toggle-bg);
        color: var(--toggle-text);
      }

      .outline-search {
        width: min(14rem, 44vw);
        min-width: 8rem;
        height: 1.35rem;
        border-radius: 5px;
        border: 1px solid var(--controls-divider);
        background: color-mix(in srgb, var(--toggle-bg) 72%, #ffffff 28%);
        color: var(--toggle-text);
        font-size: 0.75rem;
        padding: 0 0.42rem;
      }

      .outline-search::placeholder {
        color: color-mix(in srgb, var(--toggle-text) 72%, transparent 28%);
      }

      .outline-search:focus-visible {
        outline: 1px solid var(--toggle-focus);
        outline-offset: 0;
      }

      .search-hit {
        background: var(--search-hit-bg);
        color: var(--search-hit-text);
        border-radius: 3px;
        padding: 0 0.03rem;
      }

      .zoom-context {
        margin: 0 0 0.75rem 0;
        font-size: 0.8rem;
        color: var(--text-color);
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
      }

      .zoom-context[hidden] {
        display: none;
      }

      .zoom-home-link {
        color: var(--toggle-bg);
        text-decoration: none;
        font-weight: 600;
      }

      .zoom-home-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <div class="top-bar-inner">
        <div class="top-controls">
          <select id="theme-select" aria-label="Theme selector"></select>
        </div>
      </div>
    </div>
    <div class="page">
      <main>
        <div class="outline-toolbar">
          <input
            id="outline-search"
            class="outline-search"
            type="search"
            placeholder="Search"
            aria-label="Search items"
          />
        </div>
        <div id="zoom-context" class="zoom-context" hidden>
          <a id="zoom-home-link" class="zoom-home-link" href="/">Back to all items</a>
          <a id="zoom-parent-link" class="zoom-home-link" href="" hidden>Go to parent</a>
        </div>
        <div id="outline-root"></div>
        <p id="outline-error" class="error" hidden></p>
      </main>
    </div>
    <script>
      (() => {
        const errorEl = document.getElementById("outline-error");
        const rootEl = document.getElementById("outline-root");
        const zoomContextEl = document.getElementById("zoom-context");
        const zoomHomeLinkEl = document.getElementById("zoom-home-link");
        const zoomParentLinkEl = document.getElementById("zoom-parent-link");
        const themeSelect = document.getElementById("theme-select");
        const searchInputEl = document.getElementById("outline-search");
        const themeStorageKey = "orgline-theme";
        const zoomQueryParam = "item_id";
        const searchMinChars = 2;

        let outlineItems = [];
        let searchModeActive = false;
        let preSearchOpenState = null;
        let searchInputDebounceID = 0;
        let pendingBodySaveCount = 0;
        let selectedItemUUID = "";
        const dirtyEditingItemIDs = new Set();

        const themes = [
          { id: "default", label: "default" },
          { id: "dark", label: "dark" },
          { id: "matrix", label: "matrix" },
          { id: "ocean", label: "ocean" },
          { id: "solar", label: "solar" },
          { id: "graphite", label: "graphite" }
        ];

        function applyTheme(themeID) {
          const normalizedTheme = themeID === "wolfram-dark" ? "dark" : themeID;
          const selectedTheme = themes.some((theme) => theme.id === normalizedTheme) ? normalizedTheme : "default";
          document.documentElement.dataset.theme = selectedTheme;
          try {
            localStorage.setItem(themeStorageKey, selectedTheme);
          } catch (_error) {
            // Best effort only.
          }

          if (themeSelect instanceof HTMLSelectElement) {
            rebuildThemeOptions(selectedTheme);
          }
        }

        function rebuildThemeOptions(selectedThemeID) {
          if (!(themeSelect instanceof HTMLSelectElement)) {
            return;
          }

          themeSelect.replaceChildren();
          const selectedTheme = themes.find((theme) => theme.id === selectedThemeID) || themes[0];
          if (!selectedTheme) {
            return;
          }

          const selectedOption = document.createElement("option");
          selectedOption.value = selectedTheme.id;
          selectedOption.textContent = `${selectedTheme.label} theme`;
          themeSelect.appendChild(selectedOption);

          for (const theme of themes) {
            if (theme.id === selectedTheme.id) {
              continue;
            }
            const option = document.createElement("option");
            option.value = theme.id;
            option.textContent = theme.label;
            themeSelect.appendChild(option);
          }

          themeSelect.value = selectedTheme.id;
        }

        function initThemeControls() {
          if (!(themeSelect instanceof HTMLSelectElement)) {
            return;
          }

          themeSelect.addEventListener("change", () => {
            applyTheme(themeSelect.value);
          });

          let storedTheme = "default";
          try {
            storedTheme = localStorage.getItem(themeStorageKey) || "default";
          } catch (_error) {
            storedTheme = "default";
          }
          applyTheme(storedTheme);
        }

        function initDevAutoReload() {
          if (globalThis.__ORGLINE_DEV_MODE !== true) {
            return;
          }

          let lastBuildID = typeof globalThis.__ORGLINE_DEV_BUILD_ID === "string"
            ? globalThis.__ORGLINE_DEV_BUILD_ID
            : "";

          window.setInterval(async () => {
            try {
              const response = await fetch("/api/dev/build", {
                cache: "no-store"
              });
              if (!response.ok) {
                return;
              }

              const payload = await response.json();
              if (!payload || typeof payload.build_id !== "string" || payload.build_id === "") {
                return;
              }

              if (lastBuildID !== "" && payload.build_id !== lastBuildID) {
                window.location.reload();
                return;
              }

              lastBuildID = payload.build_id;
            } catch (_error) {
              // Ignore transient dev-reload failures while the server restarts.
            }
          }, 700);
        }

        function suppressFocusChrome(el) {
          el.style.setProperty("outline", "none", "important");
          el.style.setProperty("border", "none", "important");
          el.style.setProperty("box-shadow", "none", "important");
          el.style.setProperty("-webkit-box-shadow", "none", "important");
        }

        function clearError() {
          if (!errorEl) {
            return;
          }
          errorEl.hidden = true;
          errorEl.textContent = "";
        }

        function showError(message) {
          if (!errorEl) {
            return;
          }
          errorEl.hidden = false;
          errorEl.textContent = message;
        }

        function markItemDirty(uuid, isDirty) {
          if (!uuid) {
            return;
          }
          if (isDirty) {
            dirtyEditingItemIDs.add(uuid);
            return;
          }
          dirtyEditingItemIDs.delete(uuid);
        }

        function hasUnsavedChanges() {
          return pendingBodySaveCount > 0 || dirtyEditingItemIDs.size > 0;
        }

        function closeAllToolMenus() {
          if (!rootEl) {
            return;
          }

          for (const menu of rootEl.querySelectorAll(".item-tool-menu")) {
            if (menu instanceof HTMLElement) {
              menu.hidden = true;
            }
          }
          for (const trigger of rootEl.querySelectorAll(".item-tool-trigger")) {
            if (trigger instanceof HTMLElement) {
              trigger.setAttribute("aria-expanded", "false");
            }
          }
        }

        function escapeSelectorValue(value) {
          if (typeof CSS !== "undefined" && typeof CSS.escape === "function") {
            return CSS.escape(value);
          }
          return value.replaceAll("\"", "\\\"");
        }

        function applySelectedItemUI() {
          if (!rootEl) {
            return;
          }

          for (const row of rootEl.querySelectorAll(".item-row.is-selected")) {
            row.classList.remove("is-selected");
          }

          if (selectedItemUUID === "") {
            return;
          }

          const row = rootEl.querySelector(`.item-row[data-uuid="${escapeSelectorValue(selectedItemUUID)}"]`);
          if (!(row instanceof HTMLElement)) {
            return;
          }
          row.classList.add("is-selected");
        }

        function setSelectedItem(uuid) {
          selectedItemUUID = uuid || "";
          applySelectedItemUI();
        }

        function zoomItemIDFromURL() {
          const params = new URLSearchParams(window.location.search);
          return (params.get(zoomQueryParam) || "").trim();
        }

        function writeZoomItemIDToURL(itemID, replaceHistory = false) {
          const url = new URL(window.location.href);
          if (itemID === "") {
            url.searchParams.delete(zoomQueryParam);
          } else {
            url.searchParams.set(zoomQueryParam, itemID);
          }

          if (replaceHistory) {
            window.history.replaceState({}, "", url.toString());
            return;
          }
          window.history.pushState({}, "", url.toString());
        }

        function zoomToItem(itemID) {
          const current = zoomItemIDFromURL();
          writeZoomItemIDToURL(itemID, current === itemID);
        }

        function findItemByUUID(items, uuid) {
          for (const item of items) {
            if (item.uuid === uuid) {
              return item;
            }
            const foundInChildren = findItemByUUID(item.children, uuid);
            if (foundInChildren) {
              return foundInChildren;
            }
          }

          return null;
        }

        function findParentUUID(items, targetUUID, parentUUID = "") {
          for (const item of items) {
            if (item.uuid === targetUUID) {
              return parentUUID;
            }
            const found = findParentUUID(item.children, targetUUID, item.uuid);
            if (found !== null) {
              return found;
            }
          }

          return null;
        }

        function setZoomContextVisible(isVisible, parentUUID = "") {
          if (!(zoomContextEl instanceof HTMLElement)) {
            return;
          }

          zoomContextEl.hidden = !isVisible;
          if (!isVisible) {
            return;
          }

          if (zoomHomeLinkEl instanceof HTMLAnchorElement) {
            const homeURL = new URL(window.location.href);
            homeURL.searchParams.delete(zoomQueryParam);
            zoomHomeLinkEl.href = homeURL.toString();
          }

          if (zoomParentLinkEl instanceof HTMLAnchorElement) {
            const hasParent = parentUUID !== "";
            zoomParentLinkEl.hidden = !hasParent;
            if (hasParent) {
              const parentURL = new URL(window.location.href);
              parentURL.searchParams.set(zoomQueryParam, parentUUID);
              zoomParentLinkEl.href = parentURL.toString();
            } else {
              zoomParentLinkEl.href = "";
            }
          }
        }

        function activeSearchQuery() {
          if (!(searchInputEl instanceof HTMLInputElement)) {
            return "";
          }
          return searchInputEl.value.trim();
        }

        function shouldActivateSearch(query) {
          return query.length >= searchMinChars;
        }

        function collectOpenState(items, openMap = new Map()) {
          for (const item of items) {
            openMap.set(item.uuid, item.is_open);
            collectOpenState(item.children, openMap);
          }
          return openMap;
        }

        function applyOpenState(items, openMap) {
          if (!(openMap instanceof Map)) {
            return;
          }

          for (const item of items) {
            if (openMap.has(item.uuid)) {
              item.is_open = openMap.get(item.uuid);
            }
            applyOpenState(item.children, openMap);
          }
        }

        function collectSearchView(items, query) {
          const visibleIDs = new Set();
          const matchedIDs = new Set();
          const forcedOpenIDs = new Set();
          const queryLower = query.toLocaleLowerCase();

          if (queryLower === "") {
            return { visibleIDs, matchedIDs, forcedOpenIDs };
          }

          function walk(item) {
            const selfMatches = item.body.toLocaleLowerCase().includes(queryLower);
            let childHasVisible = false;

            for (const child of item.children) {
              if (walk(child)) {
                childHasVisible = true;
              }
            }

            const isVisible = selfMatches || childHasVisible;
            if (isVisible) {
              visibleIDs.add(item.uuid);
              if (selfMatches) {
                matchedIDs.add(item.uuid);
              }
              if (childHasVisible) {
                forcedOpenIDs.add(item.uuid);
              }
            }

            return isVisible;
          }

          for (const item of items) {
            walk(item);
          }

          return { visibleIDs, matchedIDs, forcedOpenIDs };
        }

        function escapeHTML(value) {
          return value
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
        }

        function findMatchRanges(text, query) {
          const ranges = [];
          const q = query.toLocaleLowerCase();
          if (q === "") {
            return ranges;
          }

          const textLower = text.toLocaleLowerCase();
          let fromIndex = 0;
          while (fromIndex < text.length) {
            const foundAt = textLower.indexOf(q, fromIndex);
            if (foundAt < 0) {
              break;
            }
            ranges.push({ start: foundAt, end: foundAt + q.length });
            fromIndex = foundAt + q.length;
          }

          return ranges;
        }

        function mergeWindows(windows) {
          if (windows.length <= 1) {
            return windows;
          }

          windows.sort((a, b) => a.start - b.start || a.end - b.end);
          const merged = [windows[0]];
          for (let i = 1; i < windows.length; i += 1) {
            const previous = merged[merged.length - 1];
            const current = windows[i];
            if (current.start <= previous.end) {
              previous.end = Math.max(previous.end, current.end);
            } else {
              merged.push(current);
            }
          }
          return merged;
        }

        function highlightedSliceHTML(text, sliceStart, sliceEnd, ranges) {
          let html = "";
          let cursor = sliceStart;

          for (const range of ranges) {
            if (range.end <= sliceStart || range.start >= sliceEnd) {
              continue;
            }

            const hitStart = Math.max(sliceStart, range.start);
            const hitEnd = Math.min(sliceEnd, range.end);

            if (cursor < hitStart) {
              html += escapeHTML(text.slice(cursor, hitStart));
            }
            html += `<mark class="search-hit">${escapeHTML(text.slice(hitStart, hitEnd))}</mark>`;
            cursor = hitEnd;
          }

          if (cursor < sliceEnd) {
            html += escapeHTML(text.slice(cursor, sliceEnd));
          }

          return html;
        }

        function buildMatchSnippetHTML(text, query) {
          const ranges = findMatchRanges(text, query);
          if (ranges.length === 0) {
            return escapeHTML(text);
          }

          const contextChars = 18;
          const windows = ranges.map((range) => ({
            start: Math.max(0, range.start - contextChars),
            end: Math.min(text.length, range.end + contextChars)
          }));

          const mergedWindows = mergeWindows(windows);
          const segments = [];
          for (const windowRange of mergedWindows) {
            const prefix = windowRange.start > 0 ? "..." : "";
            const suffix = windowRange.end < text.length ? "..." : "";
            const highlighted = highlightedSliceHTML(text, windowRange.start, windowRange.end, ranges);
            segments.push(`${prefix}${highlighted}${suffix}`);
          }

          return segments.join(" ");
        }

        function visibleItemUUIDs() {
          if (!rootEl) {
            return [];
          }

          return Array.from(rootEl.querySelectorAll(".item-body[data-uuid]"))
            .map((node) => node.dataset.uuid || "")
            .filter((uuid) => uuid !== "");
        }

        function adjacentItemUUID(uuid, direction) {
          const uuids = visibleItemUUIDs();
          const currentIndex = uuids.indexOf(uuid);
          if (currentIndex < 0) {
            return "";
          }

          const targetIndex = currentIndex + direction;
          if (targetIndex < 0 || targetIndex >= uuids.length) {
            return "";
          }

          return uuids[targetIndex];
        }

        function placeCaretAtEnd(el) {
          const selection = window.getSelection();
          if (!selection) {
            return;
          }

          const range = document.createRange();
          range.selectNodeContents(el);
          range.collapse(false);
          selection.removeAllRanges();
          selection.addRange(range);
        }

        function focusItemForEditing(uuid) {
          if (!rootEl || searchModeActive) {
            return;
          }

          const target = rootEl.querySelector(`.item-body[data-uuid="${uuid}"]`);
          if (!(target instanceof HTMLElement)) {
            return;
          }

          target.contentEditable = "true";
          target.classList.add("editing");
          setSelectedItem(uuid);
          suppressFocusChrome(target);
          target.focus();
          placeCaretAtEnd(target);
        }

        async function saveItemBody(uuid, body) {
          pendingBodySaveCount += 1;
          try {
            const response = await fetch(`/api/items/${encodeURIComponent(uuid)}`, {
              method: "PATCH",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ body })
            });

            if (!response.ok) {
              throw new Error(`save failed with status ${response.status}`);
            }
          } finally {
            pendingBodySaveCount = Math.max(0, pendingBodySaveCount - 1);
          }
        }

        async function saveItemOpenState(uuid, isOpen) {
          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/open-state`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ is_open: isOpen })
          });

          if (!response.ok) {
            throw new Error(`save open state failed with status ${response.status}`);
          }
        }

        async function deleteItem(uuid) {
          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}`, {
            method: "DELETE"
          });

          if (!response.ok) {
            throw new Error(`delete item failed with status ${response.status}`);
          }
        }

        async function createItemAfterEnter(uuid) {
          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/enter`, {
            method: "POST"
          });

          if (!response.ok) {
            throw new Error(`create item failed with status ${response.status}`);
          }

          return response.json();
        }

        async function indentItem(uuid) {
          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/indent`, {
            method: "POST"
          });
          if (!response.ok) {
            throw new Error(`indent failed with status ${response.status}`);
          }
        }

        async function outdentItem(uuid) {
          const response = await fetch(`/api/items/${encodeURIComponent(uuid)}/outdent`, {
            method: "POST"
          });
          if (!response.ok) {
            throw new Error(`outdent failed with status ${response.status}`);
          }
        }

        function renderBody(item, renderContext) {
          let savedBody = item.body;
          let handlingEnter = false;

          const body = document.createElement("div");
          body.className = "item-body";
          body.dataset.uuid = item.uuid;
          body.title = `UUID: ${item.uuid}\nUpdated: ${item.updated_at}`;
          body.contentEditable = "false";
          body.spellcheck = false;

          const isSearchMatch = renderContext.searchActive && renderContext.searchView.matchedIDs.has(item.uuid);
          if (isSearchMatch) {
            body.innerHTML = buildMatchSnippetHTML(item.body, renderContext.query);
          } else {
            body.textContent = item.body;
          }

          suppressFocusChrome(body);

          function currentBodyText() {
            return (body.textContent ?? "").trim();
          }

          function syncDirtyState() {
            const isEditing = body.contentEditable === "true";
            markItemDirty(item.uuid, isEditing && currentBodyText() !== savedBody);
          }

          body.addEventListener("focus", () => {
            setSelectedItem(item.uuid);
            suppressFocusChrome(body);
          });

          body.addEventListener("click", () => {
            if (renderContext.searchActive || body.contentEditable === "true") {
              return;
            }
            setSelectedItem(item.uuid);
            body.contentEditable = "true";
            body.classList.add("editing");
            suppressFocusChrome(body);
            body.focus();
            placeCaretAtEnd(body);
            syncDirtyState();
          });

          body.addEventListener("input", () => {
            if (!renderContext.searchActive) {
              syncDirtyState();
            }
          });

          body.addEventListener("keydown", (event) => {
            if (renderContext.searchActive) {
              return;
            }

            if (
              (event.key === "ArrowUp" || event.key === "ArrowDown") &&
              !event.shiftKey &&
              !event.altKey &&
              !event.ctrlKey &&
              !event.metaKey
            ) {
              event.preventDefault();
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);
              const moveDirection = event.key === "ArrowUp" ? -1 : 1;
              const targetUUID = adjacentItemUUID(item.uuid, moveDirection);

              const saveAndNavigate = async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                      clearError();
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  if (targetUUID !== "") {
                    focusItemForEditing(targetUUID);
                  } else {
                    focusItemForEditing(item.uuid);
                  }
                } finally {
                  handlingEnter = false;
                }
              };

              handlingEnter = true;
              void saveAndNavigate();
              return;
            }

            if (event.key === "Backspace") {
              const currentBody = (body.textContent ?? "").trim();
              if (currentBody === "") {
                event.preventDefault();
                body.contentEditable = "false";
                body.classList.remove("editing");
                markItemDirty(item.uuid, false);

                const fallbackFocusUUID = adjacentItemUUID(item.uuid, -1) || adjacentItemUUID(item.uuid, 1);

                handlingEnter = true;
                void (async () => {
                  try {
                    await deleteItem(item.uuid);
                    await loadOutline(fallbackFocusUUID);
                  } catch (error) {
                    showError(`Unable to delete item: ${String(error)}`);
                  } finally {
                    handlingEnter = false;
                  }
                })();
                return;
              }
            }

            if (event.key === "Enter" && !event.shiftKey) {
              event.preventDefault();
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);

              const saveAndCreate = async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                      clearError();
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  const created = await createItemAfterEnter(item.uuid);
                  await loadOutline(created.uuid);
                } catch (error) {
                  showError(`Unable to create item: ${String(error)}`);
                } finally {
                  handlingEnter = false;
                }
              };

              handlingEnter = true;
              void saveAndCreate();
              return;
            }

            if (event.key === "Tab") {
              event.preventDefault();
              body.contentEditable = "false";
              body.classList.remove("editing");

              const currentBody = currentBodyText();
              body.textContent = currentBody;
              markItemDirty(item.uuid, currentBody !== savedBody);
              const moveAction = event.shiftKey ? outdentItem : indentItem;

              const saveAndMove = async () => {
                try {
                  if (currentBody !== savedBody) {
                    if (currentBody === "") {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError("Item body cannot be empty.");
                      return;
                    }

                    try {
                      await saveItemBody(item.uuid, currentBody);
                      savedBody = currentBody;
                      markItemDirty(item.uuid, false);
                      clearError();
                    } catch (error) {
                      body.textContent = savedBody;
                      markItemDirty(item.uuid, false);
                      showError(`Unable to save item: ${String(error)}`);
                      return;
                    }
                  }

                  await moveAction(item.uuid);
                  await loadOutline(item.uuid);
                } catch (error) {
                  showError(`Unable to move item: ${String(error)}`);
                } finally {
                  handlingEnter = false;
                }
              };

              handlingEnter = true;
              void saveAndMove();
            }
          });

          body.addEventListener("blur", async () => {
            if (renderContext.searchActive || handlingEnter) {
              return;
            }

            const currentBody = currentBodyText();
            body.contentEditable = "false";
            body.classList.remove("editing");
            body.textContent = currentBody;

            if (currentBody === savedBody) {
              markItemDirty(item.uuid, false);
              return;
            }
            if (currentBody === "") {
              body.textContent = savedBody;
              markItemDirty(item.uuid, false);
              showError("Item body cannot be empty.");
              return;
            }

            try {
              await saveItemBody(item.uuid, currentBody);
              savedBody = currentBody;
              item.body = currentBody;
              markItemDirty(item.uuid, false);
              clearError();
            } catch (error) {
              body.textContent = savedBody;
              markItemDirty(item.uuid, false);
              showError(`Unable to save item: ${String(error)}`);
            }
          });

          return body;
        }

        function renderTree(items, renderContext) {
          const list = document.createElement("ul");
          list.className = "outline";

          for (const item of items) {
            if (renderContext.searchActive && !renderContext.searchView.visibleIDs.has(item.uuid)) {
              continue;
            }

            const childItems = renderContext.searchActive
              ? item.children.filter((child) => renderContext.searchView.visibleIDs.has(child.uuid))
              : item.children;

            const listItem = document.createElement("li");
            const row = document.createElement("div");
            row.className = "item-row";
            row.dataset.uuid = item.uuid;
            row.addEventListener("mousedown", () => {
              setSelectedItem(item.uuid);
            });

            const controls = document.createElement("div");
            controls.className = "item-controls";

            const toolTrigger = document.createElement("button");
            toolTrigger.type = "button";
            toolTrigger.className = "item-tool-trigger";
            toolTrigger.textContent = "⋯";
            toolTrigger.setAttribute("aria-label", "Open tools");
            toolTrigger.setAttribute("aria-haspopup", "menu");
            toolTrigger.setAttribute("aria-expanded", "false");

            const toolMenu = document.createElement("div");
            toolMenu.className = "item-tool-menu";
            toolMenu.hidden = true;

            const zoomOption = document.createElement("button");
            zoomOption.type = "button";
            zoomOption.className = "item-tool-option";
            zoomOption.textContent = "Zoom";
            zoomOption.setAttribute("role", "menuitem");
            zoomOption.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              setSelectedItem(item.uuid);
              closeAllToolMenus();
              zoomToItem(item.uuid);
              void loadOutline(item.uuid);
            });
            toolMenu.appendChild(zoomOption);

            toolTrigger.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              setSelectedItem(item.uuid);
              const willOpen = toolMenu.hidden;
              closeAllToolMenus();
              toolMenu.hidden = !willOpen;
              toolTrigger.setAttribute("aria-expanded", willOpen ? "true" : "false");
            });

            const toggle = document.createElement("button");
            toggle.type = "button";
            toggle.className = "item-toggle";

            const hasChildren = childItems.length > 0;
            if (!hasChildren) {
              controls.classList.add("is-leaf");
              toggle.classList.add("is-leaf");
              toggle.disabled = true;
              toggle.textContent = "";
              toggle.setAttribute("aria-label", "No children");
              toggle.setAttribute("aria-expanded", "false");
            }

            controls.appendChild(toolTrigger);
            controls.appendChild(toggle);
            controls.appendChild(toolMenu);

            row.appendChild(controls);
            row.appendChild(renderBody(item, renderContext));
            listItem.appendChild(row);

            if (hasChildren) {
              const children = document.createElement("div");
              children.className = "item-children";
              children.appendChild(renderTree(childItems, renderContext));
              listItem.appendChild(children);

              const isOpen = renderContext.searchActive
                ? renderContext.searchView.forcedOpenIDs.has(item.uuid)
                : item.is_open;

              children.hidden = !isOpen;
              toggle.textContent = isOpen ? "▾" : "▸";
              toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
              toggle.setAttribute("aria-label", isOpen ? "Collapse children" : "Expand children");

              if (renderContext.searchActive) {
                toggle.disabled = true;
                toggle.setAttribute("aria-label", "Search keeps matching path expanded");
              } else {
                toggle.addEventListener("click", async (event) => {
                  event.preventDefault();
                  event.stopPropagation();
                  setSelectedItem(item.uuid);

                  const nextIsOpen = children.hidden;
                  const prevHidden = children.hidden;
                  children.hidden = !nextIsOpen;
                  toggle.textContent = nextIsOpen ? "▾" : "▸";
                  toggle.setAttribute("aria-expanded", nextIsOpen ? "true" : "false");
                  toggle.setAttribute("aria-label", nextIsOpen ? "Collapse children" : "Expand children");

                  try {
                    await saveItemOpenState(item.uuid, nextIsOpen);
                    item.is_open = nextIsOpen;
                  } catch (error) {
                    children.hidden = prevHidden;
                    const revertedIsOpen = !prevHidden;
                    toggle.textContent = revertedIsOpen ? "▾" : "▸";
                    toggle.setAttribute("aria-expanded", revertedIsOpen ? "true" : "false");
                    toggle.setAttribute("aria-label", revertedIsOpen ? "Collapse children" : "Expand children");
                    showError(`Unable to save open state: ${String(error)}`);
                  }
                });
              }
            }

            list.appendChild(listItem);
          }

          return list;
        }

        function renderOutline(focusUUID) {
          if (!errorEl || !rootEl) {
            return;
          }

          const zoomItemID = zoomItemIDFromURL();
          let baseItems = outlineItems;
          let isZoomView = false;
          let zoomParentUUID = "";
          if (zoomItemID !== "") {
            const zoomedItem = findItemByUUID(outlineItems, zoomItemID);
            if (zoomedItem) {
              baseItems = [zoomedItem];
              isZoomView = true;
              const foundParent = findParentUUID(outlineItems, zoomItemID);
              zoomParentUUID = foundParent || "";
            } else {
              writeZoomItemIDToURL("", true);
            }
          }

          const query = activeSearchQuery();
          const nextSearchModeActive = shouldActivateSearch(query);

          if (nextSearchModeActive && !searchModeActive) {
            preSearchOpenState = collectOpenState(baseItems);
            searchModeActive = true;
          } else if (!nextSearchModeActive && searchModeActive) {
            applyOpenState(baseItems, preSearchOpenState);
            preSearchOpenState = null;
            searchModeActive = false;
          }

          const searchView = searchModeActive
            ? collectSearchView(baseItems, query)
            : { visibleIDs: new Set(), matchedIDs: new Set(), forcedOpenIDs: new Set() };

          rootEl.replaceChildren(renderTree(baseItems, {
            searchActive: searchModeActive,
            query,
            searchView
          }));
          applySelectedItemUI();

          setZoomContextVisible(isZoomView, zoomParentUUID);
          closeAllToolMenus();
          clearError();

          if (focusUUID && !searchModeActive) {
            focusItemForEditing(focusUUID);
          }
        }

        async function loadOutline(focusUUID) {
          if (!errorEl || !rootEl) {
            return;
          }

          try {
            const response = await fetch("/api/items");
            if (!response.ok) {
              throw new Error(`request failed with status ${response.status}`);
            }

            const data = await response.json();
            outlineItems = data.items;
            renderOutline(focusUUID);
          } catch (error) {
            showError(String(error));
          }
        }

        function initSearchControls() {
          if (searchInputEl instanceof HTMLInputElement) {
            searchInputEl.addEventListener("input", () => {
              if (searchInputDebounceID !== 0) {
                window.clearTimeout(searchInputDebounceID);
              }

              searchInputDebounceID = window.setTimeout(() => {
                searchInputDebounceID = 0;
                renderOutline();
              }, 100);
            });
          }
        }

        document.addEventListener("click", () => {
          closeAllToolMenus();
        });
        window.addEventListener("beforeunload", (event) => {
          if (!hasUnsavedChanges()) {
            return;
          }

          event.preventDefault();
          event.returnValue = "";
        });
        window.addEventListener("popstate", () => {
          void loadOutline();
        });

        initThemeControls();
        initDevAutoReload();
        initSearchControls();
        void loadOutline();
      })();
    </script>
  </body>
</html>
